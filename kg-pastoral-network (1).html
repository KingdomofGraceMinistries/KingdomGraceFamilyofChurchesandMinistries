<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kingdom Grace">
<title>Kingdom Grace — Pastoral Network</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#0a0a0f;--ink2:#12121a;--ink3:#1c1c28;--ink4:#252535;
  --gold:#c8a84c;--gold2:#e8c86a;--gold3:rgba(201,168,76,0.14);--gold4:rgba(201,168,76,0.07);
  --frost:#f8f6f0;--mist:#a8a090;--ash:#6a6458;
  --flame:#e85d3a;--sage:#4a8c6a;--sky:#3a6ea8;
  --br:rgba(201,168,76,0.18);--brh:rgba(201,168,76,0.38);
  --r:16px;--rm:12px;--rs:8px;
}
html,body{height:100%;background:var(--ink);color:var(--frost);font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;background:var(--ink);}

/* PASTOR — SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;animation:fadeIn 0.22s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:0 18px 90px;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--br);}

/* BISHOP — FULL VIEWPORT DASHBOARD */
#bishop-app{display:none;width:100%;height:100%;overflow-y:auto;background:var(--ink);}
#bishop-app.active{display:flex;flex-direction:column;}
#bishop-app::-webkit-scrollbar{width:4px;}
#bishop-app::-webkit-scrollbar-thumb{background:var(--br);}
.b-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 16px;border-bottom:0.5px solid var(--br);background:var(--ink);position:sticky;top:0;z-index:10;}
.b-logo{display:flex;align-items:center;gap:12px;}
.b-crown{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.b-network{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--frost);}
.b-role{font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.b-nav{display:flex;gap:6px;align-items:center;}
.b-tab{padding:7px 14px;border-radius:var(--rm);border:0.5px solid var(--br);font-size:12px;color:var(--mist);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.b-tab:hover{border-color:var(--gold);color:var(--gold);}
.b-tab.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);font-weight:500;}
.b-signout{padding:7px 14px;border-radius:var(--rm);border:0.5px solid rgba(232,93,58,0.3);font-size:12px;color:var(--flame);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;}
.b-body{padding:24px;flex:1;max-width:1200px;margin:0 auto;width:100%;}
.b-panel{display:none;}
.b-panel.active{display:block;animation:fadeIn 0.2s ease;}

/* BISHOP — STAT STRIP */
.b-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:600px){.b-stats{grid-template-columns:repeat(2,1fr);}}
.b-stat{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px 18px;}
.b-stat-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--frost);line-height:1;}
.b-stat-num.red{color:var(--flame);}
.b-stat-num.amber{color:var(--gold);}
.b-stat-num.green{color:#4ade80;}
.b-stat-lbl{font-size:11px;color:var(--ash);margin-top:4px;letter-spacing:0.3px;}

/* BISHOP — PASTOR GRID */
.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.b-pastor-card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.b-pastor-card:hover{border-color:var(--brh);transform:translateY(-1px);}
.b-pastor-card.risk-red{border-color:rgba(232,93,58,0.4);background:rgba(232,93,58,0.04);}
.b-pastor-card.risk-amber{border-color:rgba(201,168,76,0.3);}
.b-pastor-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.b-pastor-av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;}
.b-pastor-av-init{width:46px;height:46px;border-radius:50%;background:var(--ink3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;}
.b-pastor-name{font-size:14px;font-weight:500;color:var(--frost);margin-bottom:2px;}
.b-pastor-church{font-size:11px;color:var(--mist);}
.b-burnout-bar{height:4px;border-radius:2px;background:var(--ink4);overflow:hidden;margin-bottom:8px;}
.b-burnout-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
.fill-green{background:#4ade80;}
.fill-amber{background:var(--gold);}
.fill-red{background:var(--flame);}
.b-pastor-meta{display:flex;justify-content:space-between;align-items:center;}
.b-pastor-last{font-size:10px;color:var(--ash);}

/* BISHOP — DRILL DOWN PANEL */
.b-drill{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-drill-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.b-drill-av{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);}
.b-drill-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--frost);}
.b-drill-church{font-size:12px;color:var(--gold);margin-top:2px;}
.b-section-title{font-size:11px;color:var(--ash);letter-spacing:1.2px;text-transform:uppercase;margin:20px 0 10px;}

/* BISHOP — ENGAGEMENT CHART */
.b-chart{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-chart-title{font-size:12px;color:var(--mist);margin-bottom:16px;font-weight:500;}
.b-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.b-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.b-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s ease;}
.b-bar-lbl{font-size:9px;color:var(--ash);}
.b-heat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--br);}
.b-heat-row:last-child{border-bottom:none;}
.b-heat-name{font-size:13px;color:var(--frost);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-heat-dots{display:flex;gap:3px;}
.b-heat-dot{width:14px;height:14px;border-radius:3px;}

/* BISHOP — INBOX */
.b-dm-list{max-height:400px;overflow-y:auto;padding-right:4px;}
.b-dm-list::-webkit-scrollbar{width:2px;}
.b-dm-list::-webkit-scrollbar-thumb{background:var(--br);}
.b-dm-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--br);cursor:pointer;}
.b-dm-item:hover{opacity:0.8;}
.b-dm-item.unread .b-dm-preview{color:var(--frost);}
.b-dm-preview{font-size:12px;color:var(--mist);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.b-dm-time{font-size:10px;color:var(--ash);margin-left:auto;flex-shrink:0;}
.b-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}

/* BISHOP — COMPOSE */
.b-compose{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.b-compose-title{font-size:13px;font-weight:500;color:var(--frost);margin-bottom:12px;}
.b-target-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.b-chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--mist);cursor:pointer;}
.b-chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}

/* ── SHARED PASTOR STYLES ── */
.tnav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:var(--ink);border-bottom:0.5px solid var(--br);flex-shrink:0;}
.tnav-logo{display:flex;align-items:center;gap:10px;}
.tnav-mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;flex-shrink:0;}
.tnav-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--frost);}
.tnav-sub{font-size:10px;color:var(--mist);}
.tnav-btn{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:6px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.tnav-btn:hover{border-color:var(--gold);color:var(--gold);}
.bnav{display:flex;background:var(--ink2);border-top:0.5px solid var(--br);flex-shrink:0;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;}
.bn-ic{font-size:18px;line-height:1;}
.bn-lb{font-size:9px;color:var(--mist);}
.bn.on .bn-lb{color:var(--gold);}
.bn.on .bn-ic{filter:drop-shadow(0 0 4px rgba(201,168,76,0.5));}
.flbl{font-size:11px;color:var(--mist);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;display:block;}
.fin{width:100%;background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--rm);padding:12px 14px;color:var(--frost);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.fin:focus{border-color:var(--gold);}
textarea.fin{resize:vertical;min-height:80px;}
.fsub{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--rm);padding:14px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;}
.fsub:hover{opacity:0.9;}
.fsub:disabled{opacity:0.4;cursor:not-allowed;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--mist);cursor:pointer;transition:all 0.15s;}
.chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--frost);margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--mist);line-height:1.5;}
.pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;letter-spacing:0.3px;}
.pill-gold{background:var(--gold3);color:var(--gold);border:0.5px solid rgba(201,168,76,0.3);}
.pill-red{background:rgba(232,93,58,0.12);color:var(--flame);border:0.5px solid rgba(232,93,58,0.3);}
.pill-green{background:rgba(74,140,106,0.15);color:#4ade80;border:0.5px solid rgba(74,140,106,0.3);}
.pill-mist{background:rgba(168,160,144,0.1);color:var(--mist);border:0.5px solid rgba(168,160,144,0.2);}
.pw-item{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--rm);padding:14px;margin-bottom:10px;}
.pw-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pw-name{font-size:13px;font-weight:500;color:var(--frost);}
.pw-time{font-size:10px;color:var(--ash);}
.pw-body{font-size:13px;color:var(--mist);line-height:1.6;}
.pw-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pw-act{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:5px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.pw-act:hover{border-color:var(--gold);color:var(--gold);}
.pw-act.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.pw-act.danger{border-color:rgba(232,93,58,0.4);color:var(--flame);}
.pulse-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0;}
.pulse-btn{aspect-ratio:1;border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:0.5px solid var(--br);background:var(--ink3);transition:all 0.15s;font-size:18px;}
.pulse-btn.sel{border-color:var(--gold);background:var(--gold3);}
.pulse-label{font-size:9px;color:var(--mist);}
.pulse-btn.sel .pulse-label{color:var(--gold);}
.auth-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;}
.auth-mark{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;margin:0 auto 20px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--frost);text-align:center;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--mist);text-align:center;line-height:1.6;margin-bottom:28px;}
.bio-btn{width:100%;background:var(--ink3);border:0.5px solid var(--brh);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s;}
.bio-btn:hover{border-color:var(--gold);}
.bio-icon{width:44px;height:44px;border-radius:50%;background:var(--gold3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.bio-label{font-size:14px;font-weight:500;color:var(--frost);}
.bio-sub{font-size:11px;color:var(--mist);margin-top:2px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.pin-key{background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--rm);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:var(--frost);cursor:pointer;transition:all 0.1s;font-family:'DM Sans',sans-serif;}
.pin-key:active{background:var(--ink4);transform:scale(0.95);}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:8px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--br);transition:all 0.15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.err{background:rgba(232,93,58,0.1);border:0.5px solid rgba(232,93,58,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--flame);margin-bottom:12px;display:none;}
.ok-msg{background:rgba(74,140,106,0.1);border:0.5px solid rgba(74,140,106,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:#4ade80;margin-bottom:12px;display:none;}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--ash);font-size:11px;}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--br);}
.loading{display:flex;align-items:center;justify-content:center;gap:6px;padding:24px;}
.dot-load{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bounce 1.2s infinite;}
.dot-load:nth-child(2){animation-delay:0.2s;}
.dot-load:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.empty{padding:40px 20px;text-align:center;color:var(--ash);font-size:13px;font-style:italic;}
.avatar-upload{width:80px;height:80px;border-radius:50%;background:var(--ink3);border:1.5px dashed var(--br);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 18px;font-size:11px;color:var(--mist);gap:4px;}
.avatar-upload:hover{border-color:var(--gold);}
.week-prompt{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03));border:0.5px solid var(--brh);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.week-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.week-question{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--frost);line-height:1.3;margin-bottom:10px;font-style:italic;}
.challenge-card{background:linear-gradient(135deg,rgba(58,110,168,0.12),rgba(58,110,168,0.04));border:0.5px solid rgba(58,110,168,0.3);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.dm-item{display:flex;gap:10px;margin-bottom:16px;}
.dm-item.mine{flex-direction:row-reverse;}
.dm-bubble{background:var(--ink3);border:0.5px solid var(--br);border-radius:14px;border-bottom-left-radius:4px;padding:10px 14px;max-width:75%;font-size:13px;color:var(--frost);line-height:1.5;}
.dm-item.mine .dm-bubble{background:var(--gold3);border-color:var(--gold);border-bottom-right-radius:4px;border-bottom-left-radius:14px;}
.dm-time{font-size:10px;color:var(--ash);margin-top:4px;}
.care-banner{background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.04));border:0.5px solid var(--brh);border-radius:var(--r);padding:16px;margin-bottom:16px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--rm);padding:12px;text-align:center;cursor:pointer;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);}
.stat-lbl{font-size:9px;color:var(--ash);letter-spacing:0.5px;margin-top:2px;}
</style>
</head>
<body>
<div id="app"><!-- Pastor PWA screens injected here --></div>
<div id="bishop-app"><!-- Bishop dashboard injected here --></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const C = {
  networkName:   "Kingdom Grace Family of Churches and Ministries",
  networkShort:  "Kingdom Grace",
  appId:         "kgfcm",
  bishopName:    "Bishop Peter Sasser",
  bishopTitle:   "Presiding Bishop · Kingdom Grace",
  bishopPin:     "000000",
  supabaseUrl:   "https://YOUR_PROJECT.supabase.co",
  supabaseKey:   "YOUR_ANON_KEY",
  aiProxyFn:     "kgfcm-ai-proxy",
};

const GUARDRAIL = `You are a wise, spiritually grounded pastoral care assistant for a Kingdom Grace ministry network.
Your responses must always:

const $  = id => document.getElementById(id);
const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
const showErr = (id,msg) => { const e=$(id); if(!e)return; e.textContent=msg; e.style.display='block'; };
const hideErr = id => { const e=$(id); if(e) e.style.display='none'; };
const showOk  = (id,msg) => { const e=$(id); if(!e)return; if(msg)e.textContent=msg; e.style.display='block'; };
const timeAgo = ts => {
  const s = Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
};
const initials = n => n ? n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??';
const weekNum  = () => { const d=new Date(),j=new Date(d.getFullYear(),0,1); return Math.ceil(((d-j)/86400000+j.getDay()+1)/7); };
const monthStr = () => new Date().toLocaleString('default',{month:'long',year:'numeric'});
const saveLocal = (k,v) => localStorage.setItem(C.appId+'_'+k,JSON.stringify(v));
const loadLocal = k => { try{return JSON.parse(localStorage.getItem(C.appId+'_'+k));}catch{return null;} };
const avHTML = (url,name,size=36) => url
  ? `<img src="${url}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">`
  : `<div style="width:${size}px;height:${size}px;border-radius:50%;background:var(--ink3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:${Math.round(size*0.38)}px;font-weight:700;color:var(--gold)">${initials(name)}</div>`;

// ============================================================
const SB_HDR = () => ({'Content-Type':'application/json','apikey':C.supabaseKey,'Authorization':'Bearer '+(ST.session?.token||C.supabaseKey),'Prefer':'return=representation'});
const SB_GET_HDR = () => ({'apikey':C.supabaseKey,'Authorization':'Bearer '+(ST.session?.token||C.supabaseKey)});

async function sbI(table,data){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}`,{method:'POST',headers:SB_HDR(),body:JSON.stringify(data)});
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||'Insert failed');
  return r.json();
}
async function sbU(table,filter,data){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:SB_HDR(),body:JSON.stringify(data)});
  if(!r.ok)throw new Error('Update failed');
  return r.json();
}
async function sbD(table,filter){
  await fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'DELETE',headers:SB_GET_HDR()});
}
async function sbS(table,params){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}?${new URLSearchParams(params)}`,{headers:SB_GET_HDR()});
  if(!r.ok)throw new Error('Select failed');
  return r.json();
}
async function aiCall(prompt,callType='care'){
  const r=await fetch(`${C.supabaseUrl}/functions/v1/${C.aiProxyFn}`,{
    method:'POST',headers:SB_HDR(),
    body:JSON.stringify({callType,prompt:GUARDRAIL+'\n\n'+prompt})});
  if(!r.ok)throw new Error('AI error '+r.status);
  const d=await r.json();
  return typeof d==='string'?d:JSON.stringify(d);
}

// ============================================================
// BURNOUT ENGINE
// ============================================================
function burnoutScore(p){
  let s=0;
  const gap = p.last_checkin_at ? (Date.now()-new Date(p.last_checkin_at).getTime())/(86400000) : 14;
  s += Math.min(gap,14)/14*40;
  s += ((5-(p.last_pulse_score||3))/4)*30;
  s += Math.max(0,10-(p.posts_this_week||0)*4);
  return Math.min(100,Math.round(s));
}
function burnoutLevel(score){ return score<33?'green':score<66?'amber':'red'; }
function burnoutLabel(score){ return score<33?'Thriving':score<66?'Watch':'At Risk'; }

async function runBurnoutCheck(){
  if(!ST.profile) return;
  const score = burnoutScore(ST.profile);
  if(score>=60){
    try {
      const raw = await aiCall(`A pastor named ${ST.profile.full_name} may be experiencing ministry burnout. Engagement score: ${score}/100 (higher = more at risk). Write a brief, warm, private encouragement (2-3 sentences) as if from a caring mentor. Reference one specific scripture. Speak directly to them. Do not use clinical terms. JSON: {"message":"...","verse":"...","ref":"..."}`,'care');
      const d = JSON.parse(raw.replace(/```json|```/g,'').trim());
      const banner = $('care-banner');
      if(banner){
        banner.innerHTML=`<div style="font-size:22px;margin-bottom:8px">🕊️</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--frost);margin-bottom:6px">A word for you today</div>
          <div style="font-size:13px;color:var(--mist);line-height:1.6">${d.message}<br><br><em style="color:var(--gold);font-size:12px">"${d.verse}" — ${d.ref}</em></div>`;
        banner.style.display='block';
      }
    } catch(e){ console.log('burnout prompt err',e); }
  }
}

async function getWeekPrompt(){
  const wk = weekNum();
  const cached = loadLocal('wp_'+wk);
  if(cached){ ST.weekPrompt=cached; return cached; }
  try {
    const raw = await aiCall(`Generate a weekly ministry team devotional discussion prompt for a Kingdom Grace pastoral network. Week ${wk} of the year. Make it personal, faith-stretching, and community-building. Anchor in scripture. JSON: {"prompt":"...","scripture":"...","ref":"...","theme":"..."}`,'team');
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    saveLocal('wp_'+wk,d); ST.weekPrompt=d; return d;
  } catch(e){
    return {prompt:"What is the hardest thing God is currently asking you to trust Him with in your ministry?",scripture:"Trust in the Lord with all your heart and lean not on your own understanding.",ref:"Proverbs 3:5",theme:"Radical Trust"};
  }
}

    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    saveLocal('mc_'+mo,d); ST.monthChallenge=d; return d;
  } catch(e){
    return {title:"Reach One",goal:"Personally reach one person outside your church this month",action:"A handwritten note, phone call, or personal visit to someone who needs a pastoral touch",scripture:"Go and make disciples of all nations",ref:"Matthew 28:19"};

const bioAvail = async () => typeof PublicKeyCredential!=='undefined' && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.().catch(()=>false);

async function registerBio(userId,name){
  try {
    if(!await bioAvail()) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:C.networkName,id:location.hostname},user:{id:new TextEncoder().encode(userId),name,displayName:name},pubKeyCredParams:[{alg:-7,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
    if(!cred) return false;
    saveLocal('bio_'+userId, btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    return true;
  } catch(e){ return false; }
}

async function verifyBio(userId){
  try {
    const stored=loadLocal('bio_'+userId); if(!stored) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const id=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
    const a=await navigator.credentials.get({publicKey:{challenge:ch,rpId:location.hostname,allowCredentials:[{type:'public-key',id}],userVerification:'required',timeout:60000}});
    return !!a;
  } catch(e){ return false; }
}

let pinBuf='';
function pinPress(v){

  else if(pinBuf.length<6) pinBuf+=v;
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinBuf.length));

async function submitPin(){
  const pin=pinBuf; pinBuf='';
  document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));

    if(pin===C.bishopPin){
      ST.session={userId:'bishop',role:'bishop',name:C.bishopName,token:C.supabaseKey};
      saveLocal('session',ST.session);
      launchBishopDashboard();
    } else showErr('pin-err','Incorrect PIN.');
    return;
  }
  // Pastor PIN
  try {
    const rows=await sbS('rf_pastors',{select:'*','pin_hash':'eq.'+btoa(pin),status:'eq.active'});
    if(rows.length){
      const p=rows[0];
      ST.session={userId:p.id,role:'pastor',name:p.full_name,token:C.supabaseKey};
      ST.profile=p; saveLocal('session',ST.session); saveLocal('profile',p);

let bAnnPhotoData=null;
function handleBAnnPhoto(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>4*1024*1024){alert('Photo must be under 4MB.');return;}
  const r=new FileReader();
  r.onload=e=>{
    bAnnPhotoData=e.target.result;
    const prev=$('b-ann-photo-preview');
    if(prev) prev.innerHTML=`<img src="${bAnnPhotoData}" style="width:100%;max-height:200px;object-fit:cover;border-radius:var(--rm);margin-top:8px">
      <button onclick="clearBAnnPhoto()" style="font-size:11px;color:var(--flame);background:none;border:none;cursor:pointer;margin-top:4px">✕ Remove photo</button>`;
  };
  r.readAsDataURL(file);
}
function clearBAnnPhoto(){ bAnnPhotoData=null; const p=$('b-ann-photo-preview'); if(p) p.innerHTML=''; }

async function submitBishopAnn(){
  const ta=$('b-ann-input'),btn=$('b-ann-submit-btn');
  const text=ta?.value.trim();
  if(!text&&!bAnnPhotoData){showErr('b-ann-err','Add a message or photo.');return;}
  btn.disabled=true; btn.textContent='Posting...';
  try {
    await sbI('rf_announcements',{
      pastor_id:'bishop',
      title:$('b-ann-title')?.value.trim()||'',
      body:text||'',
      image_data:bAnnPhotoData||null,
      is_pinned:false,
      status:'active'
    });
    if(ta) ta.value='';
    if($('b-ann-title')) $('b-ann-title').value='';
    bAnnPhotoData=null;
    showOk('b-ann-ok','Posted to all pastors.');
    setTimeout(()=>{ const ok=$('b-ann-ok'); if(ok) ok.style.display='none'; },2500);
    loadBishopAnnouncements();
  } catch(e){showErr('b-ann-err','Could not post.');}
  btn.disabled=false; btn.textContent='Post to all pastors →';
}

  const ta=$('b-blast-input'),btn=$('b-blast-btn');
  const text=ta?.value.trim(); if(!text){showErr('b-blast-err','Message cannot be empty.');return;}
  btn.disabled=true; btn.textContent='Sending...';
  try {
    await sbI('rf_bishop_messages',{message_text:text,type:'blast',sent_at:new Date().toISOString()});
    ta.value=''; showOk('b-blast-ok','Sent to all pastors.');
  } catch(e){showErr('b-blast-err','Could not send.');}
  btn.disabled=false; btn.textContent='Send to all →';
}

async function sendBishopInvite(){
  const name=$('inv-name')?.value.trim(),email=$('inv-email')?.value.trim();
  if(!email){showErr('inv-err','Email required.');return;}
  const btn=$('inv-btn'); btn.disabled=true; btn.textContent='Sending...';
  try {
    const token=btoa(email+':'+Date.now());
    await sbI('rf_invites',{email,invited_name:name||'',token,accepted_at:null});
    $('inv-name').value=''; $('inv-email').value='';
    showOk('inv-ok',`Invitation created for ${email}. Share this token with them: ${token}`);
    loadBishopInvites();
  } catch(e){showErr('inv-err','Could not send invite.');}
  btn.disabled=false; btn.textContent='Send invitation →';
}

async function bishopDrillPastor(pastorId){
  ST.selectedPastorId=pastorId;
  document.querySelectorAll('.b-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.b-panel').forEach(p=>p.classList.remove('active'));
  const panel=$('bp-pastor-detail'); panel.classList.add('active');
  panel.innerHTML=loading();
  try {
    const rows=await sbS('rf_pastors',{select:'*','id':'eq.'+pastorId});
    if(!rows.length){panel.innerHTML='<div class="empty">Pastor not found.</div>';return;}
    const p=rows[0];
    const score=burnoutScore(p);
    const level=burnoutLevel(score);
    const checkins=await sbS('rf_checkins',{select:'*','pastor_id':'eq.'+p.id,order:'created_at.desc',limit:'10'}).catch(()=>[]);
    const wins=await sbS('rf_wins',{select:'*','pastor_id':'eq.'+p.id,order:'created_at.desc',limit:'5'}).catch(()=>[]);
    const prayers=await sbS('rf_prayer_requests',{select:'*','pastor_id':'eq.'+p.id,order:'created_at.desc',limit:'5'}).catch(()=>[]);
    panel.innerHTML=`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <button class="b-tab" onclick="switchBishopPanel('overview')">← Back to overview</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div class="b-drill">
            <div class="b-drill-header">
              ${p.avatar_url?`<img src="${p.avatar_url}" class="b-drill-av">`:`<div class="b-pastor-av-init" style="width:60px;height:60px;font-size:22px">${initials(p.full_name)}</div>`}
              <div>
                <div class="b-drill-name">${p.full_name}</div>
                <div class="b-drill-church">${p.church_name||'—'} · ${p.city||'—'}</div>
                <div style="margin-top:6px"><span class="pill ${level==='green'?'pill-green':level==='amber'?'pill-gold':'pill-red'}">${burnoutLabel(score)} · ${score}/100</span></div>
              </div>
            </div>
            <div style="background:var(--ink3);border-radius:var(--rs);padding:12px;margin-bottom:12px">
              <div style="font-size:11px;color:var(--ash);margin-bottom:4px">Wellbeing score</div>
              <div style="height:6px;background:var(--ink4);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${score}%;background:${level==='green'?'#4ade80':level==='amber'?'var(--gold)':'var(--flame)'};border-radius:3px"></div>
              </div>
              <div style="font-size:11px;color:var(--ash);margin-top:6px">Last check-in: ${p.last_checkin_at?timeAgo(p.last_checkin_at):'Never'} · Pulse: ${['','😔','😕','😐','🙂','🔥'][p.last_pulse_score||3]}</div>
            </div>
            ${p.bio?`<div style="font-size:12px;color:var(--mist);line-height:1.6;margin-bottom:10px;font-style:italic">"${p.bio}"</div>`:''}
            ${p.prayer_focus?`<div style="background:var(--ink3);border-radius:var(--rs);padding:10px;margin-bottom:8px"><div style="font-size:10px;color:var(--gold);margin-bottom:3px">🙏 PRAYER FOCUS</div><div style="font-size:12px;color:var(--mist)">${p.prayer_focus}</div></div>`:''}
            ${p.believing_for?`<div style="background:var(--ink3);border-radius:var(--rs);padding:10px;margin-bottom:8px"><div style="font-size:10px;color:var(--gold);margin-bottom:3px">✝️ BELIEVING FOR</div><div style="font-size:12px;color:var(--mist)">${p.believing_for}</div></div>`:''}
            ${(p.spiritual_gifts||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${p.spiritual_gifts.map(g=>`<span class="pill pill-gold" style="font-size:10px">${g}</span>`).join('')}</div>`:''}

          </div>
        </div>
        <div>
          <div class="b-drill">
            <div style="font-size:12px;color:var(--mist);font-weight:500;margin-bottom:12px">Recent check-ins</div>
            ${checkins.length?checkins.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--br)">
              <span style="font-size:20px">${['','😔','😕','😐','🙂','🔥'][c.pulse_score||3]}</span>
              <div style="flex:1">
                <div style="font-size:11px;color:var(--ash)">${timeAgo(c.created_at)}</div>
                ${c.notes?`<div style="font-size:12px;color:var(--mist);font-style:italic">"${c.notes}"</div>`:''}
              </div>
            </div>`).join(''):'<div class="empty" style="padding:16px 0">No check-ins yet.</div>'}
          </div>
          <div class="b-drill">
            <div style="font-size:12px;color:var(--mist);font-weight:500;margin-bottom:10px">Recent wins</div>
            ${wins.length?wins.map(w=>`<div style="padding:8px 0;border-bottom:0.5px solid var(--br);font-size:12px;color:var(--mist)">${w.win_text}</div>`).join(''):'<div class="empty" style="padding:10px 0">No wins posted.</div>'}

// ============================================================
// BOOT
// ============================================================
function boot(){
  renderPastor();
  const saved=loadLocal('session');
  if(saved?.role==='bishop'){
    ST.session=saved;
    launchBishopDashboard(); return;
  }
  if(saved?.userId){
    ST.session=saved;
    ST.profile=loadLocal('profile');
    go('s-home'); return;
  }
  const params=new URLSearchParams(location.search);
  const token=params.get('invite');
  if(token){ $('reg-token') && ($('reg-token').value=token); go('s-register'); return; }
  go('s-login');
}

boot();
// Set logo images after boot
document.querySelectorAll('#b-logo-img, #tnav-kg-logo, .auth-logo-kg').forEach(img=>img.src=KG_LOGO);
</script>
