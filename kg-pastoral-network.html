async function postCalendarEvent(){
  const btn=$('evt-create-btn'); if(btn){ btn.disabled=true; btn.textContent='Posting...'; }
  const data={
    title:$('evt-title')?.value.trim(),
    description:$('evt-desc')?.value.trim()||null,
    event_date:$('evt-date')?.value,
    end_date:$('evt-enddate')?.value||null,
    event_time:$('evt-time')?.value.trim()||null,
    event_type:$('evt-type')?.value||null,
    location:$('evt-location')?.value.trim()||null,
    location_url:$('evt-url')?.value.trim()||null,
    is_virtual:$('evt-virtual')?.checked||false,
    created_by:ST.session?.name||null,
    pastor_id:ST.session?.userId||null,
    pastor_name:ST.session?.name||null,
    church_name:ST.profile?.church_name||null
  };
  if(!data.title || !data.event_date){
    showErr('evt-err','Title and date are required.');
    if(btn){ btn.disabled=false; btn.textContent='Post event →'; }
    return;
  }
  try {
    await sbI('rf_events',data);
    audit('EVENT_CREATED',{table:'rf_events',title:data.title});
    firePushNotify('blast',{message_text:'📅 New event: '+data.title+' on '+data.event_date}).catch(()=>{});
    ST.selectedEventDate = data.event_date;
    // jump calendar to that month
    const d = new Date(data.event_date+'T00:00');
    ST.calendarFocus = {year:d.getFullYear(),month:d.getMonth()};
    const wrap=$('event-compose-wrap'); if(wrap){ wrap.innerHTML=''; wrap.dataset.open='0'; }
    loadEvents();
  } catch(e){ showErr('evt-err','Could not post. Try again.'); if(btn){ btn.disabled=false; btn.textContent='Post event →'; } }
}

// ── CREDENTIAL DOC UPLOAD (private bucket) ─────────────────────────
async function uploadCredentialDoc(input){
  const file = input?.files?.[0]; if(!file) return;
  if(file.size > 20*1024*1024){ showErr('prof-err','Credential file must be under 20MB.'); input.value=''; return; }
  const authId = ST.session?.authUserId;
  if(!authId){ showErr('prof-err','Sign back in to upload.'); input.value=''; return; }
  const status = $('prof-cred-status'); if(status) status.textContent='Uploading…';
  try {
    const ext = (file.name.split('.').pop() || 'pdf').toLowerCase();
    const path = `${authId}/credential-${Date.now()}.${ext}`;
    await storageUploadPrivate('credentials', path, file);
    const nowIso = new Date().toISOString();
    await sbU('rf_pastors','id=eq.'+ST.session.userId,{credential_doc_path:path, credential_doc_uploaded_at:nowIso});
    ST.profile = {...ST.profile, credential_doc_path:path, credential_doc_uploaded_at:nowIso};
    saveLocal('profile', ST.profile);
    audit('CREDENTIAL_DOC_UPLOADED',{table:'rf_pastors', targetId:ST.session.userId});
    renderCredentialDocStatus();
    showOk('prof-ok','Credential saved.');
  } catch(e){
    showErr('prof-err','Could not upload credential: '+(e.message||'unknown'));
    if(status) status.textContent='No document uploaded.';
  }
  input.value='';
}

function renderCredentialDocStatus(){
  const status = $('prof-cred-status'); const viewBtn = $('prof-cred-view');
  const path = ST.profile?.credential_doc_path;
  if(path){
    const ts = ST.profile?.credential_doc_uploaded_at;
    const when = ts ? new Date(ts).toLocaleDateString() : '';
    if(status) status.textContent = '📄 On file' + (when ? ' (uploaded '+when+')' : '');
    if(viewBtn) viewBtn.style.display='';
  } else {
    if(status) status.textContent='No document uploaded.';
    if(viewBtn) viewBtn.style.display='none';
  }
}

async function viewCredentialDoc(){
  const path = ST.profile?.credential_doc_path;
  if(!path){ showErr('prof-err','No credential on file.'); return; }

    const url = await signedUrl('credentials', path, 300);

    showErr('prof-err','Could not open: '+(e.message||'unknown'));
  }
}

  const authId = ST.session?.authUserId;

  for(const file of files){
    if(file.size > 10*1024*1024){ showErr('prof-err','Each photo must be under 10MB. Skipping '+file.name); continue; }
    try {
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `${authId}/photo-${Date.now()}-${Math.floor(Math.random()*1000)}.${ext}`;
      await storageUploadPrivate('ministry-photos', path, file);
      audit('MINISTRY_PHOTO_UPLOADED',{path});
    } catch(e){
      showErr('prof-err','Could not upload '+file.name+': '+(e.message||'unknown'));
    }
  }
  input.value='';
  await loadMinistryPhotoGrid();
}

async function registerPastor(){
  const name=$('reg-name')?.value.trim();
  const email=$('reg-email')?.value.trim().toLowerCase();
  const invite_token=$('reg-token')?.value.trim();
  const pin=$('reg-pin')?.value.trim();
  if(!name){showErr('reg-err','Please enter your name.');return;}
  if(!email){showErr('reg-err','Please enter your email.');return;}
  if(!pin || !/^\d{6}$/.test(pin)){showErr('reg-err','PIN must be exactly 6 digits.');return;}
  if(!invite_token){showErr('reg-err','No invite link detected. Ask your Bishop for a new one.');return;}
  const btn=$('reg-btn'); btn.disabled=true; btn.textContent='Setting up...';
  try {
    // Edge function handles invite-token validation, PIN bcrypt hashing,
    // auth.users creation, rf_pastors insert, invite acceptance, session issue.
    const session = await signUpWithPin(email, name, pin, invite_token);
    // Try biometric setup silently — if it works, great; if not, PIN is already set.
    registerBio(session.user_id, name).catch(()=>{});
    // Fetch the freshly-created profile so the home screen renders immediately.
    try {
      const rows = await sbS('rf_pastors',{select:PASTOR_COLS, id:'eq.'+session.profile_id});
      if(rows && rows[0]) { ST.profile = rows[0]; saveLocal('profile', rows[0]); }
    } catch(_){ /* profile fetch failure is non-fatal */ }
    initNotifPolling();
    go('s-home');
  } catch(e){ showErr('reg-err', e.message || 'Registration failed.'); }
  btn.disabled=false; btn.textContent='Join '+C.networkShort+' →';
}

async function requestPinReset(){
  const email=($('reset-email')?.value || '').trim().toLowerCase();
  if(!email){showErr('reset-err','Please enter your email.');return;}
  const btn=$('reset-req-btn'); btn.disabled=true; btn.textContent='Checking...';
  try {
    // kgfcm-pin-reset: rate-limited, constant-time, sends an 8-char code via
    // Resend to the email-on-file. Always returns {sent:true} regardless of
    // whether the email is registered (enumeration defense).
    await callEdgeFn('kgfcm-pin-reset', { email });
    audit('PIN_RESET_REQUESTED', {});
    hideErr('reset-err');
    showOk('reset-ok', `If that email is on file, a reset code has been sent. Check your inbox — the code expires in 30 minutes.`);
    const sec=$('reset-token-section'); if(sec) sec.style.display='block';
  } catch(e){ showErr('reset-err','Could not process reset request. Please try again.'); }
  btn.disabled=false; btn.textContent='Send reset code →';
}

async function confirmPinReset(){
  const email=($('reset-email')?.value || '').trim().toLowerCase();
  const code=($('reset-code')?.value || '').trim().toLowerCase();
  const newPin=($('reset-new-pin')?.value || '').trim();
  if(!code || !/^[0-9a-f]{8}$/i.test(code)){showErr('reset-err','Enter the 8-character reset code from your email.');return;}
  if(!newPin || !/^\d{6}$/.test(newPin)){showErr('reset-err','New PIN must be exactly 6 digits.');return;}
  try {
    // kgfcm-pin-reset-confirm: verifies hash, bcrypts the new PIN server-side,
    // clears the reset hash, and (when possible) issues a session so the user
    // is auto-logged-in.
    const session = await callEdgeFn('kgfcm-pin-reset-confirm', { email, code, new_pin: newPin });
    hideErr('reset-err');
    if(session.access_token){
      applySession(session);
      showOk('reset-ok','PIN updated. Signing you in…');
      setTimeout(()=>{
        if(session.role === 'bishop' || session.role === 'admin'){
          launchBishopDashboard(); bishopViewApp(false); initNotifPolling();
        } else {
          go('s-home'); initNotifPolling();
        }
      }, 1200);
    } else {
      showOk('reset-ok','PIN updated. Sign in with your new PIN.');
      setTimeout(()=>go('s-login'), 1500);
    }
  } catch(e){ showErr('reset-err', e.message || 'Invalid or expired reset code.'); }
}

// rf_announcements.pastor_id is text and may hold either a rf_pastors uuid OR
// the sentinel 'bishop' — so no FK exists and PostgREST embeds (rf_pastors(...))
// return 400. This helper hydrates each row with an `rf_pastors` object client
// side, fetching only the unique non-sentinel ids in one round-trip.
async function hydratePastorRefs(rows, fkColumn, outKey){
  if(!Array.isArray(rows) || !rows.length) return;
  const ids = Array.from(new Set(rows.map(r => r?.[fkColumn]).filter(v => v && v !== 'bishop')));
  if(!ids.length) return;
  try {
    const inList = `(${ids.map(id => `"${id}"`).join(',')})`;
    const pastors = await sbS('rf_pastors',{select:'id,full_name,avatar_url',id:'in.'+inList});
    const byId = new Map(pastors.map(p => [p.id, p]));
    for(const r of rows){
      const id = r?.[fkColumn];
      if(id && byId.has(id)) r[outKey] = byId.get(id);
    }
  } catch(_){ /* hydration is best-effort; annCard falls back to 'Pastor' */ }
}

function switchBishopPanel(panel,skipPush){
  // Block admin from accessing prayer wall
  if(panel==='prayer'&&isAdmin()) return;
  const prev=ST.bishopPanel;
  if(prev===panel) return;
  if(prev&&!skipPush){ NAV.history.push({type:'bishop',panel:prev}); history.pushState({bishop:panel},'',''); }
  ST.bishopPanel=panel;
  document.querySelectorAll('.b-tab').forEach(t=>t.classList.remove('on'));
  // Highlight the active tab by matching onclick content
  document.querySelectorAll('.b-tab').forEach(t=>{
    const onclick=t.getAttribute('onclick')||'';
    if(onclick.includes("'"+panel+"'")) t.classList.add('on');
  });
  document.querySelectorAll('.b-panel').forEach(p=>p.classList.remove('active'));
  const el=$('bp-'+panel); if(el) el.classList.add('active');
  if(panel==='overview') loadBishopOverview();
  else if(panel==='engagement') loadBishopEngagement();
  else if(panel==='prayer') loadBishopPrayer();
  else if(panel==='wins') loadBishopWins();
  else if(panel==='team') loadBishopTeam();
  else if(panel==='announcements') loadBishopAnnouncements();
  else if(panel==='messages') loadBishopMessages();
  else if(panel==='devotion') loadBishopDevotion();
  else if(panel==='invites') loadBishopInvites();
  else if(panel==='manage-admins') loadManageAdmins();
  else if(panel==='bishop-profile') loadBishopProfile();
  else if(panel==='apostle-eraka') loadApostleEraka();
  else if(panel==='help') loadHelp();
}

async function generateTodayDevotion(){
  const cur=$('dev-current'); if(cur) cur.innerHTML=loading();
  try {
    const r=await fetch(`${C.supabaseUrl}/functions/v1/kgfcm-devotion-generate`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SB_API_KEY(),
        'Authorization':'Bearer '+ST.session.access_token,
      },
      body: JSON.stringify({}),
    });
    const data=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data.error||'Could not generate.');
    audit('DEVOTION_GENERATED',{table:'rf_devotions', targetId:data.draft?.id});

    loadBishopDevotion();

async function uploadDevotionMedia(id, kind, file){
  if(!file) return;
  if(file.size > 50*1024*1024){ alert('File must be under 50MB.'); return; }
  try {
    const ext = (file.name.split('.').pop() || (kind==='video'?'mp4':'webm')).toLowerCase();
    const path = `devotions/${id}-${kind}-${Date.now()}.${ext}`;
    const url = await storageUpload('voice', path, file);
    const patch = kind==='video' ? {video_url:url, source:'bishop'} : {audio_url:url, source:'bishop'};
    await sbU('rf_devotions','id=eq.'+id, patch);
    audit('DEVOTION_MEDIA_ATTACHED',{table:'rf_devotions', targetId:id, kind});
    loadBishopDevotion();
  } catch(e){ alert('Upload failed: '+(e.message||'unknown')); }
}

async function saveDevotionEdits(id, publishToo){
  const theme       = ($('edit-theme')?.value || '').trim();
  const title       = ($('edit-title')?.value || '').trim();
  const scriptureRef= ($('edit-scripture-ref')?.value || '').trim();
  const scriptureText=($('edit-scripture-text')?.value || '').trim();
  const body        = ($('edit-body')?.value || '').trim();
  const reflection  = ($('edit-reflection')?.value || '').trim();
  const prophetic   = ($('edit-prophetic')?.value || '').trim();
  if(!title || !body || !scriptureRef){
    showErr('edit-err','Title, scripture reference, and body are required.');
    return;
  }
  const patch = {
    theme, title, scripture_ref: scriptureRef, scripture_text: scriptureText,
    body, reflection_prompt: reflection, prophetic_call: prophetic,
    source: 'bishop',
  };
  if(publishToo){
    patch.status = 'published';

    patch.reviewed_by = ST.session?.userId || null;
  }
  try {
    await sbU('rf_devotions','id=eq.'+id, patch);
    audit(publishToo ? 'DEVOTION_EDITED_AND_PUBLISHED' : 'DEVOTION_EDITED', {table:'rf_devotions', targetId:id});
    closeDevotionEditor();
    loadBishopDevotion();
  } catch(e){
    showErr('edit-err','Could not save: '+(e.message||'unknown'));
  }
}

async function loadBishopEngagement(){
  const panel=$('bp-engagement'); if(!panel) return;
  panel.innerHTML=loading();
  try {
    const pastors=ST.allPastors.length?ST.allPastors:await sbS('rf_pastors',{select:PASTOR_COLS,status:'eq.active',order:'full_name.asc'});
    // Query real data: checkins and posts from the last 8 weeks
    const now=new Date();
    const eightWeeksAgo=new Date(now.getTime()-56*24*60*60*1000).toISOString();
    const [checkins,prayers,wins,teamR]=await Promise.all([
      sbS('rf_checkins',{select:'week_number',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_prayer_requests',{select:'created_at',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_wins',{select:'created_at',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_team_responses',{select:'created_at',created_at:'gte.'+eightWeeksAgo})
    ]);
    const curWeek=weekNum();
    const weekLabels=['Wk-7','Wk-6','Wk-5','Wk-4','Wk-3','Wk-2','Last','This'];
    const weekNums=Array.from({length:8},(_,i)=>curWeek-7+i);
    // Aggregate checkins by week_number
    const ciByWeek={};checkins.forEach(c=>{ciByWeek[c.week_number]=(ciByWeek[c.week_number]||0)+1;});
    // Aggregate posts by ISO week
    function isoWeek(d){const dt=new Date(d);const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil(((dt-y)/86400000+1)/7);}
    const postsByWeek={};[...prayers,...wins,...teamR].forEach(p=>{const w=isoWeek(p.created_at);postsByWeek[w]=(postsByWeek[w]||0)+1;});
    const engagement=weekNums.map((wn,i)=>({
      label:weekLabels[i],
      checkins:ciByWeek[wn]||0,
      posts:postsByWeek[wn]||0
    }));

// ── BISHOP VOICE BLAST RECORDING ──
let BLAST_REC = { recorder:null, chunks:[], blob:null, timer:null, startAt:0, duration:0 };
const BLAST_MAX_SEC = 600;

async function startBlastRecording(){
  hideErr('b-blast-err');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    BLAST_REC.chunks = [];
    BLAST_REC.blob = null;
    BLAST_REC.duration = 0;
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
               : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
               : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    BLAST_REC.recorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
    BLAST_REC.recorder.ondataavailable = e=>{ if(e.data.size>0) BLAST_REC.chunks.push(e.data); };
    BLAST_REC.recorder.onstop = ()=>{
      BLAST_REC.blob = new Blob(BLAST_REC.chunks,{type: BLAST_REC.recorder.mimeType || 'audio/webm'});
      BLAST_REC.duration = Math.floor((Date.now()-BLAST_REC.startAt)/1000);
      stream.getTracks().forEach(t=>t.stop());
      renderBlastPreview();
    };
    BLAST_REC.recorder.start();
    BLAST_REC.startAt = Date.now();
    const ctrl = $('b-voice-controls');
    if(ctrl) ctrl.innerHTML = `<button type="button" class="pw-act on" onclick="stopBlastRecording()" style="background:var(--flame);color:#fff">⏹ Stop · <span id="b-voice-timer">0:00</span></button>`;
    BLAST_REC.timer = setInterval(()=>{
      const sec = Math.floor((Date.now()-BLAST_REC.startAt)/1000);
      const mm = Math.floor(sec/60);
      const ss = String(sec%60).padStart(2,'0');
      const t = $('b-voice-timer');
      if(t) t.textContent = `${mm}:${ss}`;
      if(sec >= BLAST_MAX_SEC) stopBlastRecording();
    },500);
  } catch(e){ showErr('b-blast-err','Microphone access denied or not supported.'); }
}
function stopBlastRecording(){
  if(BLAST_REC.recorder && BLAST_REC.recorder.state!=='inactive') BLAST_REC.recorder.stop();
  if(BLAST_REC.timer){ clearInterval(BLAST_REC.timer); BLAST_REC.timer=null; }
}
function renderBlastPreview(){
  if(!BLAST_REC.blob) return;
  const url = URL.createObjectURL(BLAST_REC.blob);
  const mm = Math.floor(BLAST_REC.duration/60);
  const ss = String(BLAST_REC.duration%60).padStart(2,'0');
  const ctrl = $('b-voice-controls');
  if(ctrl) ctrl.innerHTML = `<button type="button" class="pw-act" onclick="startBlastRecording()">🎙 Re-record</button>
    <button type="button" class="pw-act" onclick="clearBlastRecording()" style="margin-left:6px">✕ Clear</button>`;
  const prev = $('b-voice-preview');
  if(prev) prev.innerHTML = `<audio controls src="${url}" style="width:100%;margin-top:8px"></audio>
    <div style="font-size:10px;color:var(--ash);margin-top:4px">Recorded · ${mm}:${ss} · Ready to send</div>`;
}
function clearBlastRecording(){
  BLAST_REC.blob = null; BLAST_REC.chunks = []; BLAST_REC.duration = 0;
  const prev = $('b-voice-preview'); if(prev) prev.innerHTML = '';
  const ctrl = $('b-voice-controls');
  if(ctrl) ctrl.innerHTML = `<button type="button" class="pw-act" onclick="startBlastRecording()">🎙 Start Recording</button>`;
}

async function sendBishopBlast(){
  const ta=$('b-blast-input'),btn=$('b-blast-btn');
  const text=ta?.value.trim()||'';
  if(!text && !BLAST_REC.blob){ showErr('b-blast-err','Type a message or record audio.'); return; }
  btn.disabled=true; btn.textContent='Sending...';
  try {
    let audioUrl=null, audioDur=null;
    if(BLAST_REC.blob){
      const ext = (BLAST_REC.blob.type.includes('mp4')?'mp4':'webm');
      const filename = `blast_${Date.now()}.${ext}`;
      audioUrl = await storageUpload('voice', filename, BLAST_REC.blob);
      audioDur = BLAST_REC.duration || null;
    }
    await sbI('rf_bishop_messages',{message_text:text||null,audio_url:audioUrl,audio_duration_seconds:audioDur,type:'blast',sent_at:new Date().toISOString()});
    audit('BISHOP_BLAST_SENT',{table:'rf_bishop_messages',hasAudio:!!audioUrl});
    firePushNotify('blast',{message_text:text||'(voice message)'});
    ta.value=''; clearBlastRecording(); showOk('b-blast-ok','Sent to all pastors.');
  } catch(e){ showErr('b-blast-err','Could not send.'); }
  btn.disabled=false; btn.textContent='Send to all →';
}

async function sendBishopInvite(){
  const name=$('inv-name')?.value.trim();
  if(!name){showErr('inv-err','Please enter the pastor\'s name.');return;}
  const btn=$('inv-btn'); btn.disabled=true; btn.textContent='Creating...';
  try {
    // SEC-2: CSPRNG-based invite token. crypto.randomUUID() yields 122 bits of
    // entropy — far stronger than the legacy btoa(name+timestamp) which leaked
    // both the invitee's name and creation time once base64-decoded.
    const token=crypto.randomUUID();
    await sbI('rf_invites',{email:'',invited_name:name,token,accepted_at:null});
    audit('BISHOP_INVITE_SENT',{table:'rf_invites',invited_name:name});
    // Build invite link
    const link=location.origin+'/?invite='+encodeURIComponent(token);
    const msg=`${C.bishopName} is inviting you to join the ${C.networkName} pastoral network.\n\nTap this link to get started:\n${link}`;
    $('inv-name').value='';
    hideErr('inv-err');
    // Show share options
    $('inv-ok').innerHTML=`<div style="margin-bottom:10px">Invite created for <strong>${esc(name)}</strong></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="fsub" style="flex:1;padding:10px;font-size:12px;min-width:120px" onclick="shareInvite('sms','${esc(encodeURIComponent(msg))}')">📱 Send via Text</button>
        <button class="fsub" style="flex:1;padding:10px;font-size:12px;min-width:120px;background:var(--ink3);border:0.5px solid var(--br);color:var(--mist)" onclick="shareInvite('share','${esc(encodeURIComponent(msg))}')">📤 Share Link</button>
        <button class="fsub" style="flex:1;padding:10px;font-size:12px;min-width:120px;background:var(--ink3);border:0.5px solid var(--br);color:var(--mist)" onclick="shareInvite('copy','${esc(link)}')">📋 Copy Link</button>
      </div>`;
    showOk('inv-ok');
    loadBishopInvites();
  } catch(e){showErr('inv-err','Could not create invite.');}
  btn.disabled=false; btn.textContent='Create Invite →';
}

function shareInvite(method, data){
  const decoded=decodeURIComponent(data);
  if(method==='sms'){
    window.open('sms:?body='+data,'_self');
  } else if(method==='share'&&navigator.share){
    navigator.share({title:'Join '+C.networkShort,text:decoded}).catch(()=>{});
  } else if(method==='share'){
    // Fallback — copy to clipboard
    navigator.clipboard.writeText(decoded).then(()=>alert('Message copied! Paste it in a text or email.')).catch(()=>{});
  } else if(method==='copy'){
    navigator.clipboard.writeText(decoded).then(()=>alert('Link copied!')).catch(()=>{});
  }
}

async function addAdmin(){
  const name=$('admin-name')?.value.trim();
  const email=($('admin-email')?.value || '').trim().toLowerCase();
  const pin=($('admin-pin')?.value || '').trim();
  if(!name){showErr('admin-err','Please enter the admin\'s name.');return;}
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){showErr('admin-err','Please enter a valid email.');return;}
  if(!pin || !/^\d{6}$/.test(pin)){showErr('admin-err','PIN must be exactly 6 digits.');return;}
  try {
    // create_admin() is a SECURITY DEFINER SQL RPC that checks is_bishop(),
    // bcrypt-hashes the PIN, and inserts the row. The plaintext PIN never
    // crosses the column GRANT layer; the bishop's JWT authorizes the call.
    const r=await fetch(`${C.supabaseUrl}/rest/v1/rpc/create_admin`,{
      method:'POST', headers:SB_HDR(),
      body:JSON.stringify({p_email:email, p_name:name, p_pin:pin}),
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      throw new Error(err.message || 'Could not add admin.');
    }
    audit('ADMIN_ADDED',{table:'rf_admins',admin_name:name,email});
    $('admin-name').value=''; $('admin-email').value=''; $('admin-pin').value='';
    hideErr('admin-err');
    showOk('admin-ok', name+' has been added as an admin. Share their starting PIN with them privately — they can change it after first login.');
    loadManageAdmins();
  } catch(e){ showErr('admin-err', e.message || 'Could not add admin.'); }
}

async function bishopResetAdminPin(adminId){

async function bishopPinResponse(id,btn){btn.classList.toggle('on');const p=btn.classList.contains('on');try{await sbU('rf_team_responses','id=eq.'+id,{is_pinned:p});audit('BISHOP_PIN_RESPONSE',{table:'rf_team_responses',targetId:id,pinned:p});btn.textContent=p?'📌 Pinned':'📌 Pin';}catch(e){btn.classList.toggle('on');btn.textContent='Error — retry';}}
async function bishopPinWin(id,btn){btn.classList.toggle('on');const p=btn.classList.contains('on');try{await sbU('rf_wins','id=eq.'+id,{is_pinned:p});audit('BISHOP_PIN_WIN',{table:'rf_wins',targetId:id,pinned:p});btn.textContent=p?'📌 Pinned':'📌 Pin';}catch(e){btn.classList.toggle('on');btn.textContent='Error — retry';}}
async function bishopRemovePrayer(id,btn){if(!confirm('Remove this prayer request?'))return;try{await sbU('rf_prayer_requests','id=eq.'+id,{status:'removed'});audit('BISHOP_REMOVE_PRAYER',{table:'rf_prayer_requests',targetId:id});btn.closest('.pw-item').remove();}catch(e){btn.textContent='Error — retry';}}
async function bishopRemoveWin(id,btn){if(!confirm('Remove this post?'))return;try{await sbD('rf_wins','id=eq.'+id);audit('BISHOP_REMOVE_WIN',{table:'rf_wins',targetId:id});btn.closest('.pw-item').remove();}catch(e){btn.textContent='Error — retry';}}
async function bishopMarkAnswered(id,btn){try{await sbU('rf_prayer_requests','id=eq.'+id,{status:'answered'});audit('BISHOP_MARK_ANSWERED',{table:'rf_prayer_requests',targetId:id});btn.textContent='✅ Answered';btn.classList.add('on');}catch(e){btn.textContent='Error — retry';}}
async function bishopPrayFor(id,btn){btn.classList.add('on');btn.textContent='🙏 Praying';try{await sbU('rf_prayer_requests','id=eq.'+id,{prayed_count:1});audit('BISHOP_PRAY_FOR',{table:'rf_prayer_requests',targetId:id});}catch(e){btn.classList.remove('on');btn.textContent='🙏 Pray';}}
async function bishopCelebrate(id,btn){btn.classList.add('on');btn.textContent='🔥 Celebrated!';try{await sbU('rf_wins','id=eq.'+id,{fire_count:1});audit('BISHOP_CELEBRATE',{table:'rf_wins',targetId:id});}catch(e){btn.classList.remove('on');btn.textContent='🔥 Celebrate';}}
function bishopRespondPrayer(pastorId){openBishopDmThread(pastorId);switchBishopPanel('messages');}
function bishopRespondWin(pastorId){openBishopDmThread(pastorId);switchBishopPanel('messages');}
function bishopReplyToResponse(pastorId){openBishopDmThread(pastorId);switchBishopPanel('messages');}
async function bishopOverridePrompt(){
  const prompt=window.prompt('Enter a custom prompt for the team this week:');
  if(!prompt) return;
  const wk=weekNum();
  const d={prompt,scripture:'',ref:'',theme:'Bishop\'s Prompt'};
  saveLocal('wp_'+wk,d); ST.weekPrompt=d;
  loadBishopTeam();
  alert('Prompt updated for this week.');
}
async function bishopRegeneratePrompt(){
  localStorage.removeItem(C.appId+'_wp_'+weekNum());

  loadBishopTeam();
}

let searchTimer=null;
function debounceSearch(q, mode){
  clearTimeout(searchTimer);
  const resultsEl=$(mode+'-search-results');
  const contentEl=$(mode==='pastor'?'pastor-home-content':null);
  if(!q.trim()){
    if(resultsEl) resultsEl.classList.remove('show');
    if(contentEl) contentEl.style.display='';
    return;
  }
  searchTimer=setTimeout(()=>runSearch(q.trim(),mode),300);
}

async function runSearch(q, mode){
  const resultsEl=$(mode+'-search-results');
  const contentEl=$(mode==='pastor'?'pastor-home-content':null);
  if(!resultsEl) return;
  resultsEl.innerHTML='<div class="search-empty">Searching...</div>';
  resultsEl.classList.add('show');
  if(contentEl) contentEl.style.display='none';

  const ql=q.toLowerCase();
  const groups=[];

  try {
    // Search prayers
    const prayers=await sbS('rf_prayer_requests',{select:'id,request_text,created_at,rf_pastors:pastor_id(full_name)',status:'eq.active',order:'created_at.desc',limit:'50'});
    const pMatches=prayers.filter(r=>(r.request_text||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(pMatches.length) groups.push({title:'Prayer Requests',icon:'🙏',screen:'s-prayer',items:pMatches.map(r=>({text:r.request_text,meta:(r.rf_pastors?.full_name||'Pastor')+' · '+timeAgo(r.created_at)}))});

    // Search wins
    const wins=await sbS('rf_wins',{select:'id,win_text,created_at,rf_pastors:pastor_id(full_name)',order:'created_at.desc',limit:'50'});
    const wMatches=wins.filter(r=>(r.win_text||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(wMatches.length) groups.push({title:'Wins',icon:'🏆',screen:'s-wins',items:wMatches.map(r=>({text:r.win_text,meta:(r.rf_pastors?.full_name||'Pastor')+' · '+timeAgo(r.created_at)}))});

    // Search announcements. rf_announcements has no FK to rf_pastors (pastor_id
    // is text and may be the 'bishop' sentinel) — hydrate the author name client
    // side via the shared helper so search results show 'Bishop' or the pastor.
    const anns=await sbS('rf_announcements',{select:'id,title,body,pastor_id,created_at',status:'eq.active',order:'created_at.desc',limit:'50'});
    await hydratePastorRefs(anns, 'pastor_id', 'rf_pastors');
    const aMatches=anns.filter(r=>(r.title||'').toLowerCase().includes(ql)||(r.body||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(aMatches.length) groups.push({title:'Announcements',icon:'📢',screen:'s-ann',items:aMatches.map(r=>({text:r.title||r.body,meta:(r.rf_pastors?.full_name||(r.pastor_id==='bishop'?'Bishop':'Pastor'))+' · '+timeAgo(r.created_at)}))});

    // Search DMs
    const uid=ST.session?.userId;
    const dmParams=mode==='bishop'
      ? {select:'id,sender_id,message_text,created_at',order:'created_at.desc',limit:'50'}
      : {select:'id,sender_id,message_text,created_at',or:`sender_id.eq.${uid},recipient_id.eq.${uid}`,order:'created_at.desc',limit:'50'};
    const dms=await sbS('rf_direct_messages',dmParams);
    const dMatches=dms.filter(r=>(r.message_text||'').toLowerCase().includes(ql));
    if(dMatches.length) groups.push({title:'Messages',icon:'✉️',screen:mode==='bishop'?null:'s-dm',items:dMatches.map(r=>({text:r.message_text,meta:timeAgo(r.created_at)}))});

    // Bishop: also search pastors
    if(mode==='bishop'){
      const pastors=ST.allPastors.length?ST.allPastors:await sbS('rf_pastors',{select:PASTOR_COLS,status:'eq.active'});
      const paMatches=pastors.filter(p=>(p.full_name||'').toLowerCase().includes(ql)||(p.church_name||'').toLowerCase().includes(ql)||(p.city||'').toLowerCase().includes(ql));
      if(paMatches.length) groups.push({title:'Pastors',icon:'👤',items:paMatches.map(p=>({text:p.full_name,meta:[p.church_name,p.city].filter(Boolean).join(' · ')||'—',action:()=>{bishopDrillPastor(p.id);$(mode+'-search').value='';resultsEl.classList.remove('show');}}))});
    }

    if(!groups.length){
      resultsEl.innerHTML='<div class="search-empty">No results for "'+esc(q)+'"</div>';
      return;
    }

    resultsEl.innerHTML=groups.map(g=>
      `<div class="search-group-title">${esc(g.title)}</div>`+
      g.items.slice(0,5).map((item,i)=>
        `<div class="search-item" data-group="${esc(g.title)}" data-idx="${i}" onclick="searchTap(this,'${g.screen||''}')">
          <div class="search-item-icon">${g.icon}</div>
          <div class="search-item-body">
            <div class="search-item-title">${esc(item.text)}</div>
            <div class="search-item-meta">${esc(item.meta)}</div>
          </div>
        </div>`
      ).join('')+
      (g.items.length>5?`<div class="search-item-meta" style="padding:8px 16px;text-align:center">+${g.items.length-5} more</div>`:'')
    ).join('');
  } catch(e){
    resultsEl.innerHTML='<div class="search-empty">Search failed. Check connection.</div>';
  }
}

const NOTIF = {
  items: [],
  unreadCount: 0,
  lastSeen: {},       // { dm: timestamp, prayer: timestamp, announcement: timestamp, blast: timestamp }
  pollInterval: null,
  audioCtx: null,
  permissionGranted: false,
};

// ── SOUND: gentle chime via Web Audio API ──
function playNotifSound(){
  try {
    if(!NOTIF.audioCtx) NOTIF.audioCtx=new AudioContext();
    const ctx=NOTIF.audioCtx;
    if(ctx.state==='suspended') ctx.resume();
    // Two-tone chime: E5 → G5
    [659.25, 783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0, ctx.currentTime+i*0.15);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime+i*0.15+0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.15+0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);
      osc.stop(ctx.currentTime+i*0.15+0.4);
    });
  } catch(e){ /* audio not available */ }
}

// ── ADD NOTIFICATION ──
function addNotification(icon, title, msg, screen){
  const n={icon, title, msg, screen, ts:new Date().toISOString(), unread:true};
  NOTIF.items.unshift(n);
  if(NOTIF.items.length>100) NOTIF.items.length=100;
  NOTIF.unreadCount=NOTIF.items.filter(x=>x.unread).length;
  updateNotifBadges();
  // In-app toast
  showNotifToast(icon, title, msg, screen);
  // Sound
  playNotifSound();
  // Browser notification (outside app)
  fireOSNotification(title, msg, icon);
  // Persist
  saveLocal('notif_items',NOTIF.items.slice(0,50));
}

// ── BROWSER NOTIFICATION API (outside app) ──
function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){ NOTIF.permissionGranted=true; subscribeToPush(); return; }
  if(Notification.permission!=='denied'){
    Notification.requestPermission().then(p=>{ NOTIF.permissionGranted=p==='granted'; if(p==='granted') subscribeToPush(); });
  }
}
function fireOSNotification(title, body, icon){
  if(!NOTIF.permissionGranted) return;
  if(document.visibilityState==='visible') return; // only when tab not focused
  try {
    const n=new Notification(C.networkShort+': '+title,{
      body: body,
      icon: KG_LOGO,
      badge: KG_LOGO,
      tag: 'kg-'+Date.now(),
      renotify: true,
    });
    n.onclick=()=>{ window.focus(); n.close(); };
  } catch(e){ /* notification not supported */ }
}

// ── POLLING: check for new content ──
function initNotifPolling(){
  // Load persisted state
  NOTIF.items=loadLocal('notif_items')||[];
  NOTIF.unreadCount=NOTIF.items.filter(x=>x.unread).length;
  NOTIF.lastSeen=loadLocal('notif_last_seen')||{};
  updateNotifBadges();
  // Request browser notification permission after first user interaction
  document.addEventListener('click',function onFirstClick(){
    requestNotifPermission();
    // Unlock audio context on first interaction
    if(NOTIF.audioCtx&&NOTIF.audioCtx.state==='suspended') NOTIF.audioCtx.resume();
    document.removeEventListener('click',onFirstClick);
  },{once:true});
  // Start polling — 60s when visible, paused when tab hidden (battery-friendly)
  const startPoll=()=>{ if(!NOTIF.pollInterval) NOTIF.pollInterval=setInterval(pollForNotifications,60000); };
  const stopPoll=()=>{ if(NOTIF.pollInterval){ clearInterval(NOTIF.pollInterval); NOTIF.pollInterval=null; } };
  pollForNotifications();
  startPoll();
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){ stopPoll(); }
    else { pollForNotifications(); startPoll(); }
  });
}

async function pollForNotifications(){
  if(!ST.session) return;
  const isBishop=ST.session.role==='bishop';
  const uid=ST.session.userId;
  try {
    // DMs — check for new messages
    const dmFilter=isBishop
      ? {select:'id,sender_id,message_text,created_at,rf_pastors:sender_id(full_name)',order:'created_at.desc',limit:'1','sender_id':'neq.bishop'}
      : {select:'id,sender_id,message_text,created_at',order:'created_at.desc',limit:'1','recipient_id':'eq.'+uid,'sender_id':'eq.bishop'};
    const dms=await sbS('rf_direct_messages',dmFilter);
    if(dms.length){
      const last=dms[0];
      const lastTs=NOTIF.lastSeen.dm||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.dm=last.created_at;
        if(lastTs){ // don't notify on first load
          const sender=isBishop?(last.rf_pastors?.full_name||'A pastor'):'Bishop '+C.bishopName.split(' ').pop();
          addNotification('✉️','New message from '+sender, last.message_text, isBishop?null:'s-dm');
        }
      }
    }

    // Prayer requests — new ones
    const prayers=await sbS('rf_prayer_requests',{select:'id,request_text,created_at,rf_pastors:pastor_id(full_name)',status:'eq.active',order:'created_at.desc',limit:'1'});
    if(prayers.length){
      const last=prayers[0];
      const lastTs=NOTIF.lastSeen.prayer||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.prayer=last.created_at;
        if(lastTs){
          addNotification('🙏','New prayer request', (last.rf_pastors?.full_name||'A pastor')+' shared a prayer request', isBishop?null:'s-prayer');
        }
      }
    }

    // Announcements — new ones
    const anns=await sbS('rf_announcements',{select:'id,title,body,created_at',status:'eq.active',order:'created_at.desc',limit:'1'});
    if(anns.length){
      const last=anns[0];
      const lastTs=NOTIF.lastSeen.announcement||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.announcement=last.created_at;
        if(lastTs){
          addNotification('📢','New announcement', last.title||last.body||'New update posted', isBishop?null:'s-ann');
        }
      }
    }

    // Bishop blasts — for pastors only
    if(!isBishop){
      const blasts=await sbS('rf_bishop_messages',{select:'id,message_text,sent_at',order:'sent_at.desc',limit:'1'});
      if(blasts.length){
        const last=blasts[0];
        const lastTs=NOTIF.lastSeen.blast||'';
        if(last.sent_at>lastTs){
          NOTIF.lastSeen.blast=last.sent_at;
          if(lastTs){
            addNotification('👑','Message from Bishop '+C.bishopName.split(' ').pop(), last.message_text, 's-home');
          }
        }
      }
    }

    saveLocal('notif_last_seen',NOTIF.lastSeen);
  } catch(e){ /* polling error — skip this cycle */ }
}

// iOS-aware PWA-install detection. Apple Web Push (iOS 16.4+) requires the
// PWA to be installed to the Home Screen — `PushManager` exists in iOS Safari
// only inside that standalone shell, not in a regular browser tab. Detect both
// "iOS device" and "running standalone" so we can give pastors the right
// guidance instead of silently failing the subscribe.
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
function isStandalonePWA(){
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches)
      || navigator.standalone === true; // legacy iOS
}

// ── PUSH SUBSCRIPTION: register with push service + save to Supabase ──
async function subscribeToPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    // iOS Safari (NOT installed as PWA) does not expose PushManager at all on
    // iOS 16.4+ — `PushManager` is only available inside the home-screen PWA.
    // Surface that to the user instead of swallowing it silently.
    if(IS_IOS && !isStandalonePWA()) showIosInstallHint();
    return;
  }
  if(!C.vapidPublicKey) return;
  try {
    const reg=await navigator.serviceWorker.ready;
    // Check for existing subscription
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      // Convert VAPID public key from base64url to Uint8Array
      const padding='='.repeat((4-C.vapidPublicKey.length%4)%4);
      const b64=C.vapidPublicKey.replace(/-/g,'+').replace(/_/g,'/')+padding;
      const raw=atob(b64);
      const key=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) key[i]=raw.charCodeAt(i);

      sub=await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:key
      });
    }
    if(!sub) return;
    // Save subscription to Supabase. RLS gate is `user_id = auth.uid()`,
    // so the column must hold the auth.users id, NOT the rf_pastors profile id.
    const subJson=sub.toJSON();
    const userId=ST.session?.authUserId;
    if(!userId) return;
    await sbUpsert('rf_push_subscriptions',{
      user_id:userId,
      endpoint:subJson.endpoint,
      p256dh:subJson.keys?.p256dh||'',
      auth:subJson.keys?.auth||'',
      updated_at:new Date().toISOString()
    },'user_id,endpoint').catch(()=>{});
    audit('PUSH_SUBSCRIBED',{endpoint_host: (subJson.endpoint||'').split('/')[2] || 'unknown'});
  } catch(e){
    // Subscribe can throw on iOS PWA if user denies, on Android if the device
    // has no Play Services, or if the push service rejects the VAPID key.
    // Route the failure through audit so we can debug in rf_audit_log without
    // a console.* call.
    audit('PUSH_SUBSCRIBE_FAILED',{message: (e && e.message) ? e.message.slice(0,200) : 'unknown', ios: IS_IOS, standalone: isStandalonePWA()});
  }
}

// Render a one-time, dismissible hint asking iOS users to install the PWA to
// the home screen so push works. Idempotent: the element is built once and
// reused; subsequent calls just re-show it.
function showIosInstallHint(){
  if(document.getElementById('ios-install-hint')) {
    document.getElementById('ios-install-hint').style.display='flex';
    return;
  }
  const hint=document.createElement('div');
  hint.id='ios-install-hint';

  hint.innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold)">📲 Enable notifications</div>
    <div>Tap the <strong style="color:var(--gold)">Share</strong> button in Safari, then <strong style="color:var(--gold)">Add to Home Screen</strong>. Open the app from your home screen and notifications will turn on.</div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="tnav-btn" onclick="document.getElementById('ios-install-hint').remove()">Got it</button>
    </div>`;
  document.body.appendChild(hint);
}

// ============================================================
// BOOT
// ============================================================
async function boot(){
  history.replaceState({screen:'root'},'',' ');
  await loadConfig();
  renderPastor();
  applyTheme();

  // Handle magic-link callback BEFORE checking saved sessions. Supabase Auth
  // redirects to `${origin}/#access_token=...&refresh_token=...&type=magiclink`.
  // consumeMagicLinkHash parses the hash, looks up the user role, establishes
  // a session, and clears the hash so a refresh doesn't re-process it.
  const magic = await consumeMagicLinkHash();
  if(magic){
    if(magic.role === 'bishop' || magic.role === 'admin'){
      launchBishopDashboard(); bishopViewApp(false); initNotifPolling(); return;
    }
    go('s-home'); initNotifPolling(); return;
  }

  const saved=loadLocal('session');
  if(saved?.role==='bishop'||saved?.role==='admin'){
    ST.session=saved;
    launchBishopDashboard(); bishopViewApp(false); initNotifPolling(); return;
  }
  if(saved?.userId){
    ST.session=saved;
    ST.profile=loadLocal('profile');
    go('s-home'); initNotifPolling(); return;
  }
  const params=new URLSearchParams(location.search);
  const token=params.get('invite');
  if(token){ $('reg-token') && ($('reg-token').value=token); go('s-register'); return; }
  go('s-login');
}

boot();

// ── SERVICE WORKER + OFFLINE SUPPORT ──
const offlineBar=document.getElementById('kg-offline-bar');
const onlineToast=document.getElementById('kg-online-toast');
let swReady=null;

// ── Auto-update: reload the page as soon as a new SW takes control ──
let reloadingForUpdate = false;
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(reloadingForUpdate) return;
    reloadingForUpdate = true;
    window.location.reload();
  });

  navigator.serviceWorker.register('/sw.js').then(reg=>{
    swReady=reg;
    // Request background sync when available
    if('sync' in reg) reg.sync.register('kg-sync-mutations').catch(()=>{});

    // Force-check for a new SW on boot
    reg.update().catch(()=>{});

    // Check for updates every 5 min and whenever the tab becomes visible
    setInterval(()=>{ reg.update().catch(()=>{}); }, 5*60*1000);
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible') reg.update().catch(()=>{});
    });

    // If a new SW is already waiting on boot, activate it
    if(reg.waiting){ reg.waiting.postMessage('SKIP_WAITING'); }
    reg.addEventListener('updatefound', ()=>{
      const nw = reg.installing;
      if(!nw) return;
      nw.addEventListener('statechange', ()=>{
        if(nw.state==='installed' && navigator.serviceWorker.controller){
          // A new version is ready — tell it to take over immediately
          nw.postMessage('SKIP_WAITING');
        }
      });
    });
  }).catch(()=>{});

  // Listen for messages from service worker
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data.type==='QUEUED_OFFLINE'){
      // The SW only queues when it believes we're offline, but defend in depth:
      // ignore the message entirely if the browser knows we're online. This
      // prevents a stuck "No connection" banner when the queue path fires for
      // a transient non-network failure (CORS edge case, TLS reset, etc.).
      if(navigator.onLine === false){
        offlineBar.classList.add('show');
      }
    }
    if(e.data.type==='SYNC_COMPLETE'){
      if(e.data.synced>0){
        showOnlineToast(e.data.synced+' item'+(e.data.synced>1?'s':'')+' synced');
      }
      if(e.data.remaining===0) offlineBar.classList.remove('show');
    }
    if(e.data.type==='FORCE_SYNC_DONE'){
      showOnlineToast('Sync complete');
    }
  });
}

// Self-heal the offline banner: any time the page becomes visible AND the
// browser reports we're online, the banner shouldn't be showing. Catches the
// case where an older SW left QUEUED_OFFLINE messages behind during a CORS or
// TLS hiccup and the bar got stuck.
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && navigator.onLine !== false){
    offlineBar.classList.remove('show');
  }
});

function showOnlineToast(msg){
  onlineToast.textContent='\u2713 '+msg;
  onlineToast.classList.add('show');
  setTimeout(()=>onlineToast.classList.remove('show'),3000);
}

function forceSyncNow(){
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage('FORCE_SYNC');
  }
}

window.addEventListener('online',()=>{
  offlineBar.classList.remove('show');
  showOnlineToast('Back online \u2014 syncing your data');
  // Trigger background sync
  if(swReady&&'sync' in swReady) swReady.sync.register('kg-sync-mutations').catch(()=>{});
  else if(navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage('FORCE_SYNC');
});

window.addEventListener('offline',()=>{
  offlineBar.classList.add('show');
});

// Show bar immediately if already offline
if(!navigator.onLine) offlineBar.classList.add('show');
</script>
