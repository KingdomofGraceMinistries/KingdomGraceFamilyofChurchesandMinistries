<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pastoral Network">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/jpeg" sizes="48x48" href="/icons/kg-logo.jpg">
<link rel="icon" type="image/svg+xml" href="/icons/icon-512.svg">
<link rel="apple-touch-icon" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/kg-logo.jpg">
<title>Pastoral Network</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
/* ── ROOT PALETTE (offline fallback) ──
   These are the offline-fallback values used before loadConfig() runs OR if Supabase is
   unreachable. The real palettes are stored in rf_network_config.themes (JSON) and applied
   at runtime by applyTheme(), which calls setProperty() on document.documentElement. This
   means a tenant can ship any color scheme without touching this file. */
:root{
  --ink:#0a0a0f;--ink2:#12121a;--ink3:#1c1c28;--ink4:#252535;
  --gold:#c8a84c;--gold2:#e8c86a;--gold3:rgba(201,168,76,0.14);--gold4:rgba(201,168,76,0.07);
  --frost:#f8f6f0;--mist:#a8a090;--ash:#6a6458;
  --flame:#e85d3a;--sage:#4a8c6a;--sky:#3a6ea8;
  --thrive:#4ade80;--info2:#60a5fa;
  --br:rgba(201,168,76,0.18);--brh:rgba(201,168,76,0.38);
  --r:16px;--rm:12px;--rs:8px;
}
/* Atmosphere layer: faint gold halo at top center over a radial depth gradient. Applies at all widths so mobile no longer reads as a flat black void. */
html,body{
  height:100%;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at top, #141018 0%, #05040a 100%);
  color:var(--frost);
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;background:transparent;}
/* Church-logo watermark behind app content. Centered, desaturated, very low opacity — atmosphere, not decoration. The opaque .tnav / .bnav / .card backgrounds clip it to the negative space (between cards, around search) where it gives weight without competing. */
#app::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('/icons/kg-logo.jpg') center center / 70% no-repeat;
  pointer-events:none;
  z-index:0;
  /* Default (dark theme): brighten the logo so it's visible at low opacity
     on a near-black backdrop. */
  opacity:0.07;
  filter:grayscale(1) brightness(1.6);
}
/* Light theme (cream): darken the logo and bump opacity so it doesn't
   disappear into the cream background. */
html[data-theme="cream"] #app::before{
  opacity:0.10;
  filter:grayscale(1) brightness(0.45) contrast(1.2);
}
/* Cream theme: the scripture card's hardcoded gold gradient background
   (set on .week-prompt) reads as golden-cream and washes out the gold
   text inside. Switch to the standard cream card background (var(--ink2))
   so the scripture card matches the rest of the cards on cream and gold
   text reads cleanly against it. Dark theme unaffected. */
html[data-theme="cream"] .week-prompt{
  background:var(--ink2);
}
#app > *{position:relative;z-index:1;}
/* App-screen visual frame — card edges only show at tablet/desktop. Mobile stays fullscreen. */
@media (min-width:500px){
  #app{
    height:calc(100vh - 32px);
    max-height:900px;
    margin:16px auto;
    border:1px solid var(--brh);
    border-radius:22px;
    box-shadow:0 0 0 1px rgba(201,168,76,0.06),0 24px 60px rgba(0,0,0,0.55),0 2px 8px rgba(0,0,0,0.35);
    overflow:hidden;
  }
}

/* PASTOR — SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;animation:fadeIn 0.22s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scroll{overflow-y:auto;flex:1;padding:0 18px 90px;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--br);}

/* BISHOP — FULL VIEWPORT DASHBOARD */
#bishop-app{display:none;width:100%;height:100%;overflow-y:auto;background:var(--ink);}
#bishop-app.active{display:flex;flex-direction:column;}
#bishop-app::-webkit-scrollbar{width:4px;}
#bishop-app::-webkit-scrollbar-thumb{background:var(--br);}
.b-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 16px;border-bottom:0.5px solid var(--br);background:var(--ink);position:sticky;top:0;z-index:10;}
.b-logo{display:flex;align-items:center;gap:12px;}
.b-crown{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.b-network{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--frost);}
.b-role{font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.b-nav{display:flex;gap:6px;align-items:center;}
.b-tab{padding:7px 14px;border-radius:var(--rm);border:0.5px solid var(--br);font-size:12px;color:var(--mist);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.b-tab:hover{border-color:var(--gold);color:var(--gold);}
.b-tab.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);font-weight:500;}
.b-signout{padding:7px 14px;border-radius:var(--rm);border:0.5px solid rgba(232,93,58,0.3);font-size:12px;color:var(--flame);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;}
.b-body{padding:24px;flex:1;max-width:1200px;margin:0 auto;width:100%;}
.b-panel{display:none;}
.b-panel.active{display:block;animation:fadeIn 0.2s ease;}

/* BISHOP — STAT STRIP */
.b-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:600px){.b-stats{grid-template-columns:repeat(2,1fr);}}
.b-stat{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px 18px;}
.b-stat-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--frost);line-height:1;}
.b-stat-num.red{color:var(--flame);}
.b-stat-num.amber{color:var(--gold);}
.b-stat-num.green{color:var(--thrive);}
.b-stat-lbl{font-size:11px;color:var(--ash);margin-top:4px;letter-spacing:0.3px;}

/* BISHOP — PASTOR GRID */
.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.b-pastor-card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.b-pastor-card:hover{border-color:var(--brh);transform:translateY(-1px);}
.b-pastor-card.risk-red{border-color:rgba(232,93,58,0.4);background:rgba(232,93,58,0.04);}
.b-pastor-card.risk-amber{border-color:rgba(201,168,76,0.3);}
.b-pastor-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.b-pastor-av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;}
.b-pastor-av-init{width:46px;height:46px;border-radius:50%;background:var(--ink3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;}
.b-pastor-name{font-size:14px;font-weight:500;color:var(--frost);margin-bottom:2px;}
.b-pastor-church{font-size:11px;color:var(--mist);}
.b-burnout-bar{height:4px;border-radius:2px;background:var(--ink4);overflow:hidden;margin-bottom:8px;}
.b-burnout-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
.fill-green{background:var(--thrive);}
.fill-amber{background:var(--gold);}
.fill-red{background:var(--flame);}
.b-pastor-meta{display:flex;justify-content:space-between;align-items:center;}
.b-pastor-last{font-size:10px;color:var(--ash);}

/* BISHOP — DRILL DOWN PANEL */
.b-drill{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-drill-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.b-drill-av{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);}
.b-drill-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--frost);}
.b-drill-church{font-size:12px;color:var(--gold);margin-top:2px;}
.b-section-title{font-size:11px;color:var(--ash);letter-spacing:1.2px;text-transform:uppercase;margin:20px 0 10px;}

/* BISHOP — ENGAGEMENT CHART */
.b-chart{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-chart-title{font-size:12px;color:var(--mist);margin-bottom:16px;font-weight:500;}
.b-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.b-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.b-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s ease;}
.b-bar-lbl{font-size:9px;color:var(--ash);}
.b-heat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--br);}
.b-heat-row:last-child{border-bottom:none;}
.b-heat-name{font-size:13px;color:var(--frost);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-heat-dots{display:flex;gap:3px;}
.b-heat-dot{width:14px;height:14px;border-radius:3px;}

/* BISHOP — INBOX */
.b-dm-list{max-height:400px;overflow-y:auto;padding-right:4px;}
.b-dm-list::-webkit-scrollbar{width:2px;}
.b-dm-list::-webkit-scrollbar-thumb{background:var(--br);}
.b-dm-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--br);cursor:pointer;}
.b-dm-item:hover{opacity:0.8;}
.b-dm-item.unread .b-dm-preview{color:var(--frost);}
.b-dm-preview{font-size:12px;color:var(--mist);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.b-dm-time{font-size:10px;color:var(--ash);margin-left:auto;flex-shrink:0;}
.b-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}

/* BISHOP — COMPOSE */
.b-compose{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.b-compose-title{font-size:13px;font-weight:500;color:var(--frost);margin-bottom:12px;}
.b-target-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.b-chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--mist);cursor:pointer;}
.b-chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}

/* ── SHARED PASTOR STYLES ── */
.tnav{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 12px calc(18px + env(safe-area-inset-left));background:var(--ink);border-bottom:0.5px solid var(--br);flex-shrink:0;box-sizing:border-box;min-height:calc(72px + env(safe-area-inset-top));}
.tnav-logo{display:flex;align-items:center;gap:10px;}
.tnav-mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;flex-shrink:0;}
.tnav-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--frost);}
.tnav-sub{font-size:10px;color:var(--mist);}
.tnav-btn{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:6px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.tnav-btn:hover{border-color:var(--gold);color:var(--gold);}
.bnav{display:flex;background:var(--ink2);border-top:0.5px solid var(--br);flex-shrink:0;padding:0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;}
.bn-ic{font-size:18px;line-height:1;}
.bn-lb{font-size:9px;color:var(--mist);}
.bn.on .bn-lb{color:var(--gold);}
.bn.on .bn-ic{filter:drop-shadow(0 0 4px rgba(201,168,76,0.5));}
.flbl{font-size:11px;color:var(--mist);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;display:block;}
.fin{width:100%;background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--rm);padding:12px 14px;color:var(--frost);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.fin:focus{border-color:var(--gold);}
textarea.fin{resize:vertical;min-height:80px;}
.fsub{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--rm);padding:14px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;}
.fsub:hover{opacity:0.9;}
.fsub:disabled{opacity:0.4;cursor:not-allowed;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--mist);cursor:pointer;transition:all 0.15s;}
.chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--frost);margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--mist);line-height:1.5;}
.pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;letter-spacing:0.3px;}
.pill-gold{background:var(--gold3);color:var(--gold);border:0.5px solid rgba(201,168,76,0.3);}
.pill-red{background:rgba(232,93,58,0.12);color:var(--flame);border:0.5px solid rgba(232,93,58,0.3);}
.pill-green{background:rgba(74,140,106,0.15);color:var(--thrive);border:0.5px solid rgba(74,140,106,0.3);}
.pill-mist{background:rgba(168,160,144,0.1);color:var(--mist);border:0.5px solid rgba(168,160,144,0.2);}
.pw-item{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--rm);padding:14px;margin-bottom:10px;}
.pw-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pw-name{font-size:13px;font-weight:500;color:var(--frost);}
.pw-time{font-size:10px;color:var(--ash);}
.pw-body{font-size:13px;color:var(--mist);line-height:1.6;}
.pw-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pw-act{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:5px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.pw-act:hover{border-color:var(--gold);color:var(--gold);}
.pw-act.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.pw-act.danger{border-color:rgba(232,93,58,0.4);color:var(--flame);}
.pulse-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0;}
.pulse-btn{aspect-ratio:1;border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:0.5px solid var(--br);background:var(--ink3);transition:all 0.15s;font-size:18px;}
.pulse-btn.sel{border-color:var(--gold);background:var(--gold3);}
.pulse-label{font-size:9px;color:var(--mist);}
.pulse-btn.sel .pulse-label{color:var(--gold);}
.auth-shell{display:flex;flex-direction:column;align-items:center;flex:1;padding:28px 22px 48px;overflow-y:auto;min-height:0;}
.auth-shell > *{flex-shrink:0;}
/* In-app back button (floats top-left inside #app, hidden on root screens) */
.back-fab{position:absolute;top:12px;left:12px;z-index:50;width:40px;height:40px;border-radius:50%;border:0.5px solid var(--brh);background:rgba(10,10,15,0.72);color:var(--gold);font-size:20px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 14px rgba(0,0,0,0.35);font-family:'DM Sans',sans-serif;padding:0;}
.back-fab:hover{border-color:var(--gold);}
.back-fab:active{transform:scale(0.94);}
.back-fab.visible{display:flex;}
.auth-mark{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;margin:0 auto 20px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--frost);text-align:center;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--mist);text-align:center;line-height:1.6;margin-bottom:28px;}
.bio-btn{width:100%;background:var(--ink3);border:0.5px solid var(--brh);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s;}
.bio-btn:hover{border-color:var(--gold);}
.bio-icon{width:44px;height:44px;border-radius:50%;background:var(--gold3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.bio-label{font-size:14px;font-weight:500;color:var(--frost);}
.bio-sub{font-size:11px;color:var(--mist);margin-top:2px;}
.err{background:rgba(232,93,58,0.1);border:0.5px solid rgba(232,93,58,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--flame);margin-bottom:12px;display:none;}
.ok-msg{background:rgba(74,140,106,0.1);border:0.5px solid rgba(74,140,106,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--thrive);margin-bottom:12px;display:none;}
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(232,93,58,0.95);color:#fff;text-align:center;padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transform:translateY(-100%);transition:transform 0.3s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.offline-bar.show{transform:translateY(0);}
.offline-bar .sync-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:var(--rs);padding:3px 10px;font-size:11px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;}
.online-toast{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(74,140,106,0.95);color:#fff;text-align:center;padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transform:translateY(-100%);transition:transform 0.3s ease;}
.online-toast.show{transform:translateY(0);}

/* NOTIFICATION SYSTEM */
.notif-toast{position:fixed;top:12px;right:12px;left:12px;max-width:400px;margin:0 auto;z-index:10000;background:var(--ink2);border:0.5px solid var(--gold);border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:translateY(-120%);transition:transform 0.3s ease;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.notif-toast.show{transform:translateY(0);}
.notif-toast-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.notif-toast-body{flex:1;min-width:0;}
.notif-toast-title{font-size:13px;font-weight:500;color:var(--frost);margin-bottom:2px;}
.notif-toast-msg{font-size:12px;color:var(--mist);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notif-toast-time{font-size:10px;color:var(--ash);margin-top:3px;}
.notif-toast-close{position:absolute;top:8px;right:10px;font-size:14px;color:var(--ash);cursor:pointer;line-height:1;}

<script>
// ============================================================
// CONFIG
// ============================================================
// Only connection credentials stay client-side — everything else comes from Supabase
const C = {
  // ── Connection (required to reach Supabase) ──
  supabaseUrl:   "https://kseocbwhuveieqhayske.supabase.co",
  // SEC-8: publishable key only. The legacy long-lived anon JWT (exp 2036)
  // was removed — both the publishable key and that JWT pointed at the same
  // anon role, so the JWT was redundant attack surface. Anyone holding the
  // publishable key gets the same access (which is now correctly bounded by
  // the RLS policies installed in migration 20260513170000_real_auth).
  supabasePublishableKey: "sb_publishable_NYSIUwcIft1MvYcDcn8T2g_gD7_L5uz",
  get supabaseKey() { return this.supabasePublishableKey; },
  // ── Populated from Supabase at boot ──
  networkName:   '',
  networkShort:  '',
  appId:         '',
  bishopName:    '',
  bishopTitle:   '',
  tagline:       '',
  estLine:       '',
  logoUrl:       '/icons/kg-logo.jpg',
  aiProxyFn:     '',
  pushNotifyFn:  '',
  vapidPublicKey:'',
  themes:        null,  // populated from rf_network_config: { default, tip, options:[{id,label,description,palette:{...}}] }
  footerText:    '',
  footerUrl:     '',

  // ── White-label content (people, bios, photos) ──

let KG_LOGO = '/icons/kg-logo.jpg';

// Bishop mitre — purple body with gold orphrey band and gold cross at apex.
// Inline SVG so it scales with font-size and does not depend on any font/emoji set.
const MITRE = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:1em;height:1em;display:inline-block;vertical-align:-0.15em" aria-label="Mitre"><path d="M12 3Q6 7 6 14L6 20L18 20L18 14Q18 7 12 3Z" fill="#6a2c8a" stroke="#c8a84c" stroke-width="0.8"/><rect x="6" y="13" width="12" height="1.6" fill="#c8a84c"/><rect x="11.3" y="0.6" width="1.4" height="3" fill="#c8a84c"/><rect x="10.1" y="1.4" width="3.8" height="1" fill="#c8a84c"/></svg>';

// Fetch all config from Supabase — called once at boot
async function loadConfig(){
  try {
    const rows=await sbS('rf_network_config',{select:'key,value'});
    const cfg={};
    rows.forEach(r=>cfg[r.key]=r.value);
    C.networkName   = cfg.network_name   || C.networkName;
    C.networkShort  = cfg.network_short  || C.networkShort;
    C.appId         = cfg.app_id         || C.appId;
    C.bishopName    = cfg.bishop_name    || C.bishopName;
    C.bishopTitle   = cfg.bishop_title   || C.bishopTitle;
    C.tagline       = cfg.tagline        || C.tagline;
    C.estLine       = cfg.est_line       || C.estLine;
    C.logoUrl       = cfg.logo_url       || C.logoUrl;
    C.aiProxyFn     = cfg.ai_proxy_fn    || C.aiProxyFn;
    C.pushNotifyFn  = cfg.push_notify_fn || C.pushNotifyFn;
    C.vapidPublicKey= cfg.vapid_public_key||C.vapidPublicKey;
    C.footerText    = cfg.footer_text    || C.footerText;
    C.footerUrl     = cfg.footer_url     || C.footerUrl;
    C.footerBrand   = cfg.footer_brand   || C.footerBrand;
    C.bishopPhotoUrl= cfg.bishop_photo_url|| C.bishopPhotoUrl;
    C.bishopBio     = cfg.bishop_bio     || C.bishopBio;
    C.apostleName   = cfg.apostle_name   || C.apostleName;
    C.apostleShort  = cfg.apostle_short  || C.apostleShort;
    C.apostleTitle  = cfg.apostle_title  || C.apostleTitle;
    C.apostleRoleLabel = cfg.apostle_role_label || C.apostleRoleLabel;
    C.apostlePhotoUrl  = cfg.apostle_photo_url  || C.apostlePhotoUrl;
    C.apostleBio    = cfg.apostle_bio    || C.apostleBio;
    C.couplePhotoUrl= cfg.couple_photo_url|| C.couplePhotoUrl;
    C.coupleBio     = cfg.couple_bio     || C.coupleBio;
    if(cfg.themes){ try{ C.themes = JSON.parse(cfg.themes); }catch(e){ C.themes=null; } }
    KG_LOGO = C.logoUrl;
    // Update page title, meta, and manifest
    document.title = C.networkShort + ' — Pastoral Network';
    const metaTitle=document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if(metaTitle) metaTitle.content=C.networkShort;
    // Manifest theme color comes from the default theme's --ink (background)
    const defaultPalette = C.themes?.options?.find(o=>o.id===C.themes.default)?.palette;
    const manifestColor = defaultPalette?.ink || '#0a0a0f';
    // Manifest properties whose values are URLs (start_url, icons[].src) must
    // be absolute when the manifest is served from a blob: URL, because
    // relative paths resolve against the blob: origin (which is sandboxed) and
    // get dropped by Chrome with "URL is invalid" warnings.
    const base = location.origin;
    const toAbs = (path) => /^https?:/.test(path) ? path : (base + (path.startsWith('/') ? path : '/' + path));
    const manifest={name:C.networkShort+' — Pastoral Network',short_name:C.networkShort,description:'Pastoral care and network oversight for '+C.networkName,start_url:base+'/',display:'standalone',orientation:'portrait',background_color:manifestColor,theme_color:manifestColor,icons:[{src:toAbs(C.logoUrl),sizes:'843x843',type:'image/jpeg',purpose:'any'},{src:toAbs(C.logoUrl),sizes:'843x843',type:'image/jpeg',purpose:'maskable'},{src:base+'/icons/icon-192.svg',sizes:'192x192',type:'image/svg+xml',purpose:'any'},{src:base+'/icons/icon-512.svg',sizes:'512x512',type:'image/svg+xml',purpose:'any'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const manifestLink=document.querySelector('link[rel="manifest"]');
    if(manifestLink) manifestLink.href=URL.createObjectURL(blob);
  } catch(e){ /* offline — use cached or defaults */ }
}

// ============================================================
// ERROR BOUNDARY — top-level catch for uncaught errors and unhandled
// promise rejections. Never let an exception silently crash the app;
// surface a non-intrusive toast and (best-effort) log to audit.
// ============================================================
function reportUnhandled(label, e){
  try {
    const detail = e && (e.error || e.reason || e);
    const msg = (detail && (detail.message || detail.toString())) || 'Unknown error';
    try { audit('CLIENT_'+label, { error: String(msg), stack: detail && detail.stack ? String(detail.stack).slice(0, 800) : null }); } catch(_) {}
    if (typeof showOnlineToast === 'function') {
      showOnlineToast('Something went wrong. The team has been notified.');
    }
  } catch(_) { /* swallow — boundary itself must never throw */ }
}
window.addEventListener('error',              (e) => reportUnhandled('UNCAUGHT_ERROR',     e));
window.addEventListener('unhandledrejection', (e) => reportUnhandled('UNHANDLED_REJECTION', e));

// AI GUARDRAIL
// ============================================================
function GUARDRAIL(){ return `You are a wise, spiritually grounded pastoral care assistant for the ${C.networkName||'ministry'} network.
Your responses must always:
1. Be anchored in scripture and biblical truth — reference specific verses
2. Speak as a seasoned elder — compassionate, direct, never patronizing
3. Never drift into secular psychology, self-help clichés, or motivational fluff
4. Gently redirect despair or negativity back to faith, community, and God's promises
5. Keep responses concise — pastors are busy people
6. Never undermine pastoral authority or church unity
Respond in JSON only when requested. Never add markdown code fencing.`; }

// ============================================================
// STATE
// ============================================================
const ST = {
  session: null,
  profile: null,
  pin: '',
  pinTarget: null,
  selectedPulse: null,
  avatarData: null,
  bishopPanel: 'overview',
  selectedPastorId: null,

};

// ============================================================
// UTILS
// ============================================================
const $  = id => document.getElementById(id);
const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
const showErr = (id,msg) => { const e=$(id); if(!e)return; e.textContent=msg; e.style.display='block'; };
const hideErr = id => { const e=$(id); if(e) e.style.display='none'; };
const showOk  = (id,msg) => { const e=$(id); if(!e)return; if(msg)e.textContent=msg; e.style.display='block'; };
const timeAgo = ts => {
  const s = Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
};
const esc = s => { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
const initials = n => n ? n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??';
function comingSoon(label){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--ink2);border:1px solid var(--gold);border-radius:var(--r);padding:22px 28px;max-width:320px;text-align:center;z-index:10001;box-shadow:0 20px 60px rgba(0,0,0,0.6)';
  d.innerHTML=`<div style="font-size:32px;margin-bottom:8px">✨</div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);margin-bottom:6px">${esc(label)}</div><div style="font-size:13px;color:var(--mist);line-height:1.5">Coming soon.</div><button style="margin-top:14px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--rm);padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer" onclick="this.parentElement.remove()">Close</button>`;
  document.body.appendChild(d);
  setTimeout(()=>{ if(d.parentElement) d.remove(); }, 4000);
}
// ISO 8601 week number — weeks start on Monday. The Thursday-anchor trick
// (shift the date to the Thursday of its ISO week, then count Thursdays from
// year start) is the standard implementation. Bishop requirement: the week
// prompt rotates every Monday, not Sunday.
const weekNum = () => {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
};
const monthStr = () => new Date().toLocaleString('default',{month:'long',year:'numeric'});
const saveLocal = (k,v) => localStorage.setItem(C.appId+'_'+k,JSON.stringify(v));
const loadLocal = k => { try{return JSON.parse(localStorage.getItem(C.appId+'_'+k));}catch{return null;} };

// ── THEME (data-driven from rf_network_config.themes) ──
// Per-device preference key. Stored value is a theme id like "dark", "cream", "navy" — whatever
// the tenant has configured in their themes JSON. Login screens always show the default theme.
const THEME_KEY = 'kgfcm_theme';
const AUTH_SCREENS = ['s-login','s-pin','s-forgot-pin','s-register'];
function getThemeId(){
  return localStorage.getItem(THEME_KEY) || C.themes?.default || 'dark';
}
function findTheme(id){
  return C.themes?.options?.find(o=>o.id===id) || null;
}
function injectPalette(palette){
  if(!palette) return;
  const root = document.documentElement;
  Object.keys(palette).forEach(k => root.style.setProperty('--'+k, palette[k]));
}
function clearPaletteOverrides(){
  // Drop any inline CSS variable overrides so :root fallback values take effect again
  const root = document.documentElement;
  ['ink','ink2','ink3','ink4','gold','gold2','gold3','gold4','frost','mist','ash','flame','sage','sky','thrive','info2','br','brh']
    .forEach(k => root.style.removeProperty('--'+k));
}
function setTheme(id){
  const t = findTheme(id);
  if(!t) return;
  localStorage.setItem(THEME_KEY, id);
  applyTheme();
  // Update picker selection if visible
  document.querySelectorAll('.theme-opt').forEach(el=>{
    el.style.borderColor = el.dataset.theme===id ? 'var(--gold)' : 'var(--br)';
  });
}
function footerHTML(){
  // Returns the configured footer markup, or an empty string if no footer is configured.

    : '';
  return `<div class="eve-footer">${text}${text&&brand?' ':''}${brandHTML}</div>`;
}

// rf_pastors safe column list. pin_bcrypt / reset_token_hash are NOT here —
// the migration revokes those grants from authenticated; only service_role
// reads them via edge functions. Use this constant for every rf_pastors
// SELECT call so we never accidentally request a forbidden column.
const PASTOR_COLS = 'id,email,full_name,church_name,city,years_in_ministry,bio,prayer_focus,believing_for,spiritual_gifts,avatar_url,status,last_checkin_at,last_pulse_score,posts_this_week,created_at,credential_type,ordination_date,ordained_by,covering_under,credential_status,role,auth_user_id,credential_doc_path,credential_doc_uploaded_at';

// Edge function names. Deployed without --no-verify-jwt; they accept the
// publishable key as Authorization and apply their own rate limit + audit.
const FN_PIN_LOGIN    = 'kgfcm-pin-login';
const FN_PIN_REGISTER = 'kgfcm-pin-register';

// Per-device remembered email for faster re-login (never the PIN).
const LAST_EMAIL_KEY = 'kgfcm_last_email';

const SB_API_KEY     = () => C.supabasePublishableKey;
const SB_AUTH_TOKEN  = () => ST.session?.access_token || SB_API_KEY();
// SEC-10: Every mutation gets a fresh Idempotency-Key. If the network drops
// between server-side commit and client receipt of the response, sw.js
// queues the request for replay; the SW carries the same key forward and
// skips replays for keys it has already seen succeed.
function newIdempotencyKey(){ return crypto.randomUUID(); }
const SB_HDR     = () => ({'Content-Type':'application/json','apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Prefer':'return=representation','Idempotency-Key':newIdempotencyKey()});
const SB_GET_HDR = () => ({'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN()});

// Refresh the access_token using the refresh_token. Returns true on success.
async function refreshSession(){
  if(!ST.session?.refresh_token) return false;
  try {
    const r = await fetch(`${C.supabaseUrl}/auth/v1/token?grant_type=refresh_token`, {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_API_KEY()},
      body: JSON.stringify({refresh_token: ST.session.refresh_token})
    });
    if(!r.ok) return false;
    const data = await r.json();
    ST.session.access_token  = data.access_token;
    ST.session.refresh_token = data.refresh_token;
    ST.session.expires_at    = data.expires_at;
    saveLocal('session', ST.session);
    return true;
  } catch(e){ return false; }
}

// PostgREST helpers with one-shot 401/403 refresh-and-retry. PostgREST
// returns 401 when the JWT is rejected at the auth layer and 403 when RLS
// denies the row — but if our access_token is missing/expired we fall back
// to the publishable (anon) key in SB_AUTH_TOKEN, and PostgREST returns 403
// because anon has no UPDATE/DELETE policy. Retry on either status after
// a token refresh.
async function sbWithRetry(builder){
  let r = await builder();
  if((r.status === 401 || r.status === 403) && await refreshSession()){
    r = await builder();
  }
  // If we still got an auth failure after refresh AND we don't have a
  // session token, force the user back to login — don't keep firing requests
  // as anon that will all 403. This is the honest "your session expired" UX
  // instead of mysterious silent failures.
  if((r.status === 401 || r.status === 403) && !ST.session?.access_token){
    try { await signOutSession(); } catch(_){}
    go('s-login');
  }
  return r;
}
async function sbI(table,data){
  const r = await sbWithRetry(() => fetch(`${C.supabaseUrl}/rest/v1/${table}`,{method:'POST',headers:SB_HDR(),body:JSON.stringify(data)}));
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).message || 'Insert failed');
  return r.json();
}
async function sbUpsert(table,data,onConflict){
  const headers = {...SB_HDR(),'Prefer':'resolution=merge-duplicates,return=representation'};
  const url = `${C.supabaseUrl}/rest/v1/${table}?on_conflict=${encodeURIComponent(onConflict)}`;
  const r = await sbWithRetry(() => fetch(url,{method:'POST',headers,body:JSON.stringify(data)}));
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).message || 'Upsert failed');
  return r.json();
}
async function sbU(table,filter,data){
  const r = await sbWithRetry(() => fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:SB_HDR(),body:JSON.stringify(data)}));
  if(!r.ok){
    let msg = 'Update failed ('+r.status+')';
    try { const d = await r.json(); msg = d?.message || d?.error || msg; } catch(_){}
    throw new Error(msg);
  }
  return r.json();
}
async function sbD(table,filter){
  await sbWithRetry(() => fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'DELETE',headers:SB_GET_HDR()}));
}
async function sbS(table,params){
  const r = await sbWithRetry(() => fetch(`${C.supabaseUrl}/rest/v1/${table}?${new URLSearchParams(params)}`,{headers:SB_GET_HDR()}));
  if(!r.ok) throw new Error('Select failed');
  return r.json();
}

// ── EDGE FUNCTION + AUTH FLOWS ──
async function callEdgeFn(name, body){
  const r = await fetch(`${C.supabaseUrl}/functions/v1/${name}`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_API_KEY()},
    body: JSON.stringify(body)
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || `Request failed (${r.status})`);
  // A stale service worker on an older device may queue this request offline and
  // return 202 {queued:true}. That body is not a valid auth/edge-fn result and
  // must not be applied as a session — surface as a real error instead.
  if(data && data.queued === true) throw new Error('You appear to be offline. Try again on Wi-Fi.');
  return data;
}

// Trigger Supabase Auth to email a magic link to the user. Same email that
// owns the PIN account; auth.users.email_confirm was set during PIN login
// so signInWithOtp won't try to create a new user.
async function sendMagicLink(email){
  const r = await fetch(`${C.supabaseUrl}/auth/v1/otp`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_API_KEY()},
    body: JSON.stringify({
      email,
      create_user: false,
      options: { email_redirect_to: location.origin + '/' }
    })
  });
  if(!r.ok){
    const data = await r.json().catch(()=>({}));
    throw new Error(data.error_description || data.msg || 'Could not send magic link.');
  }
  return true;
}

// Handle the redirect that Supabase Auth sends on magic-link click. The URL
// hash looks like `#access_token=...&refresh_token=...&expires_in=3600&type=magiclink`.
// Extract tokens, fetch the user (for role), establish a session.
async function consumeMagicLinkHash(){
  if(!location.hash || location.hash.indexOf('access_token=') === -1) return false;
  const params = new URLSearchParams(location.hash.slice(1));
  const access_token  = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const expires_in    = parseInt(params.get('expires_in') || '3600', 10);
  if(!access_token || !refresh_token) return false;
  // Look up the user via /auth/v1/user with the access token.
  try {
    const u = await fetch(`${C.supabaseUrl}/auth/v1/user`, {
      headers:{'apikey':SB_API_KEY(),'Authorization':'Bearer '+access_token}
    });
    if(!u.ok) throw new Error('Magic-link session invalid.');
    const user = await u.json();
    const role = (user.app_metadata && user.app_metadata.role) || 'pastor';
    // Resolve the profile_id (rf_pastors.id or rf_admins.id) by auth_user_id.
    let profile_id = null, name = '';
    if(role === 'pastor'){
      const rows = await sbS('rf_pastors',{select:PASTOR_COLS, auth_user_id:'eq.'+user.id});
      if(rows[0]){ profile_id = rows[0].id; name = rows[0].full_name; ST.profile = rows[0]; saveLocal('profile', rows[0]); }
    } else {
      const rows = await sbS('rf_admins',{select:'id,full_name,is_bishop', auth_user_id:'eq.'+user.id});
      if(rows[0]){ profile_id = rows[0].id; name = rows[0].full_name; }
    }
    applySession({
      access_token,
      refresh_token,
      expires_at: Math.floor(Date.now()/1000) + expires_in,
      user_id: user.id,
      profile_id,
      role,
    }, name);
    // Clear the hash so a refresh doesn't re-process it.
    history.replaceState(null, '', location.pathname + location.search);
    audit('LOGIN_SUCCESS_MAGIC',{role});
    return { role, profile_id };
  } catch(e){
    return false;
  }
}
// ── STORAGE UPLOAD ──
async function storageUpload(bucket, path, file){
  // Some files (renamed iPhone HEICs, raw camera files, drag-and-drop from
  // certain apps) come through with file.type='' — Supabase storage rejects
  // empty Content-Type with a 400. Fall back to image/jpeg when the
  // browser couldn't sniff a type, which matches the .jpg extension the
  // upload helpers currently generate.
  const contentType = file.type || 'image/jpeg';
  // x-upsert is intentionally omitted. With it set, Supabase storage emits
  // INSERT ... ON CONFLICT DO UPDATE, which makes Postgres evaluate the
  // UPDATE policy's WITH CHECK against the would-be-updated row even when
  // there's no actual conflict — that path was rejecting authenticated
  // pastor uploads with "new row violates row-level security policy" on
  // the announcements / wins / avatars buckets. All callers generate a
  // fresh Date.now()-suffixed path, so collisions don't happen in practice.
  const r=await fetch(`${C.supabaseUrl}/storage/v1/object/${bucket}/${path}`,{
    method:'POST',
    headers:{'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Content-Type':contentType},
    body:file
  });
  if(!r.ok){
    let detail='';
    try { const body=await r.text(); detail=body ? ' — '+body.slice(0,200) : ''; } catch(_){}
    throw new Error('Upload failed: '+r.status+detail);
  }
  return `${C.supabaseUrl}/storage/v1/object/public/${bucket}/${path}`;
}

// Upload to a private (non-public) bucket. The bucket has no
// /object/public/ surface, so we return ONLY the storage path. The
// caller is responsible for generating a short-lived signed URL via
// signedUrl(bucket, path) when it's time to fetch the file.
async function storageUploadPrivate(bucket, path, file){
  const contentType = file.type || 'application/octet-stream';
  // x-upsert intentionally omitted — see storageUpload() above for the
  // RLS reason. Private buckets (credentials, ministry-photos) also
  // generate fresh Date.now()-suffixed paths so collisions don't happen.
  const r=await fetch(`${C.supabaseUrl}/storage/v1/object/${bucket}/${path}`,{
    method:'POST',
    headers:{'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Content-Type':contentType},
    body:file
  });
  if(!r.ok){
    let detail='';
    try { const body=await r.text(); detail=body ? ' — '+body.slice(0,200) : ''; } catch(_){}
    throw new Error('Upload failed: '+r.status+detail);
  }
  return path;
}

// Generate a short-lived signed URL for a private bucket object. The
// caller's JWT decides whether they may access this path (storage RLS),
// so this never produces a URL the JWT couldn't have read directly.
async function signedUrl(bucket, path, expiresIn=300){
  const r=await fetch(`${C.supabaseUrl}/storage/v1/object/sign/${bucket}/${path}`,{
    method:'POST',
    headers:{'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Content-Type':'application/json'},
    body:JSON.stringify({expiresIn})
  });
  if(!r.ok) throw new Error('Could not generate signed URL: '+r.status);
  const data=await r.json();
  const rel = data.signedURL || data.signedUrl || '';
  return rel ? `${C.supabaseUrl}/storage/v1${rel}` : '';
}

// List objects in a private bucket folder. Used to render the

// without leaking other folders' contents to the response (RLS still

async function listPrivateFolder(bucket, prefix, limit=100){

// Modal text editor. Single-purpose: prompt the user for a new value for one
// field, then call onSave(newValue). Used by every edit handler below.
function openTextEditor({title, value, placeholder, multiline=true, onSave}){
  const existing = document.getElementById('kg-text-editor');
  if(existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'kg-text-editor';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10003;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto';
  const inputHtml = multiline
    ? `<textarea id="kg-text-editor-input" class="fin" rows="6" style="resize:vertical;width:100%" placeholder="${esc(placeholder||'')}">${esc(value||'')}</textarea>`
    : `<input id="kg-text-editor-input" class="fin" type="text" style="width:100%" placeholder="${esc(placeholder||'')}" value="${esc(value||'')}">`;
  modal.innerHTML = `
    <div style="background:var(--ink2);border:1px solid var(--gold);border-radius:var(--r);max-width:560px;width:100%;padding:20px;margin-top:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold)">${esc(title||'Edit')}</div>
        <button class="pw-act" type="button" onclick="closeTextEditor()">✕</button>
      </div>
      ${inputHtml}
      <div class="err" id="kg-text-editor-err" style="margin-top:10px"></div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="fsub" id="kg-text-editor-save" style="flex:1" type="button">Save</button>
        <button class="pw-act" type="button" onclick="closeTextEditor()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const saveBtn = document.getElementById('kg-text-editor-save');
  const input = document.getElementById('kg-text-editor-input');
  saveBtn.onclick = async () => {
    const newValue = (input?.value || '').trim();
    if(!newValue){ showErr('kg-text-editor-err','Cannot be empty.'); return; }
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      await onSave(newValue);
      closeTextEditor();
    } catch(e){
      showErr('kg-text-editor-err', e?.message ? e.message.slice(0,200) : 'Save failed.');
      saveBtn.disabled = false; saveBtn.textContent = 'Save';
    }
  };
  setTimeout(() => input?.focus(), 50);
}
function closeTextEditor(){
  const m = document.getElementById('kg-text-editor');
  if(m) m.remove();
}

// ── AUDIT LOGGER ──
// Routes through the kgfcm-audit edge function (SEC-6). The function reads
// actor_id and actor_role from the verified JWT — clients cannot spoof
// either anymore. Pre-login calls (no access_token) skip silently; the
// login/register edge functions write their own server-side audit rows.
async function audit(eventType, meta={}){
  try {
    if(!ST.session?.access_token) return;
    // Skip if the token is already past expires_at; the call would 401 and
    // the browser would log a network error even though we'd swallow the throw.
    const exp = ST.session.expires_at;
    if(exp && Math.floor(Date.now()/1000) >= Number(exp)) return;
    const {table, targetId, ...rest} = meta;
    await fetch(`${C.supabaseUrl}/functions/v1/kgfcm-audit`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SB_API_KEY(),
        'Authorization':'Bearer '+ST.session.access_token,
      },
      body: JSON.stringify({
        event_type:   eventType,
        target_table: table    || null,
        target_id:    targetId || null,
        metadata:     rest,
      }),
    });
  } catch(e){ /* audit failures must not break the app */ }
}

async function aiCall(prompt,callType='care'){
  const r=await fetch(`${C.supabaseUrl}/functions/v1/${C.aiProxyFn}`,{
    method:'POST',headers:SB_HDR(),
    body:JSON.stringify({callType,prompt:GUARDRAIL()+'\n\n'+prompt})});
  if(!r.ok)throw new Error('AI error '+r.status);
  const d=await r.json();
  return typeof d==='string'?d:JSON.stringify(d);
}

function burnoutScore(p){
  let s=0;
  const gap = p.last_checkin_at ? (Date.now()-new Date(p.last_checkin_at).getTime())/(86400000) : 14;
  s += Math.min(gap,14)/14*40;
  s += ((5-(p.last_pulse_score||3))/4)*30;
  s += Math.max(0,10-(p.posts_this_week||0)*4);
  return Math.min(100,Math.round(s));
}
function burnoutLevel(score){ return score<33?'green':score<66?'amber':'red'; }
function burnoutLabel(score){ return score<33?'Thriving':score<66?'Watch':'At Risk'; }

async function runBurnoutCheck(){
  if(!ST.profile) return;
  const score = burnoutScore(ST.profile);
  if(score>=60){
    try {
      const raw = await aiCall(`A pastor named ${ST.profile.full_name} may be experiencing ministry burnout. Engagement score: ${score}/100 (higher = more at risk). Write a brief, warm, private encouragement (2-3 sentences) as if from a caring mentor. Reference one specific scripture. Speak directly to them. Do not use clinical terms. JSON: {"message":"...","verse":"...","ref":"..."}`,'care');
      const d = JSON.parse(raw.replace(/```json|```/g,'').trim());

          <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--frost);margin-bottom:6px">A word for you today</div>
          <div style="font-size:13px;color:var(--mist);line-height:1.6">${esc(d.message)}<br><br><em style="color:var(--gold);font-size:12px">"${esc(d.verse)}" — ${esc(d.ref)}</em></div>`;

// ============================================================
// AI CONTENT
// ============================================================
// "Renderable" = has the three required substantive fields. `theme` is a
// nice-to-have label; if AI omits it we synthesize a neutral one rather than
// throw the whole prompt away. The three fields below are what the home
// screen actually displays as content.
function isValidWeekPrompt(d){
  return d && typeof d==='object'
    && typeof d.prompt==='string'    && d.prompt.trim().length > 0
    && typeof d.scripture==='string' && d.scripture.trim().length > 0
    && typeof d.ref==='string'       && d.ref.trim().length > 0;
}
function normalizeWeekPrompt(d){
  if(!isValidWeekPrompt(d)) return null;
  return {
    prompt:    d.prompt.trim(),
    scripture: d.scripture.trim(),
    ref:       d.ref.trim(),
    theme:     (typeof d.theme==='string' && d.theme.trim()) || 'This week',
  };
}
// Purge any cached AI content under `<appId>_<prefix><something>` whose
// "something" doesn't match the current bucket. Keeps localStorage from
// growing every week/month and guarantees that crossing a boundary
// (Sunday→Monday or last-day-of-month→first-of-month) drops the stale
// content so the next call goes fresh to the AI.
function purgeStaleAIKeys(prefix, currentBucket){
  try {
    const fullPrefix = C.appId + '_' + prefix;
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith(fullPrefix) && k !== fullPrefix + currentBucket) {
        localStorage.removeItem(k);
      }
    }
  } catch(_) { /* private mode etc. — non-fatal */ }
}
// Read the Bishop-configured fallback from rf_network_config. The Bishop sets
// `default_week_prompt` as a JSON string in the SQL Editor (or future admin UI);
// until he does, the row holds an empty string and this returns null.
async function getBishopConfiguredWeekPrompt(){
  try {
    const rows = await sbS('rf_network_config',{select:'value', key:'eq.default_week_prompt'});
    const raw = rows?.[0]?.value;
    if(!raw || !raw.trim()) return null;
    return normalizeWeekPrompt(JSON.parse(raw));
  } catch(_){ return null; }
}
async function getWeekPrompt(){
  const wk = weekNum();
  purgeStaleAIKeys('wp_', String(wk));
  const cached = loadLocal('wp_'+wk);
  // Defensive: an earlier malformed AI response could have poisoned the cache
  // with an empty or partial object. Only honor the cache if it has the three
  // required substantive fields.
  if(isValidWeekPrompt(cached)){ ST.weekPrompt = normalizeWeekPrompt(cached); return ST.weekPrompt; }
  try {
    const raw = await aiCall(`Generate a weekly ministry team devotional discussion prompt for the ${C.networkName} pastoral network. Week ${wk} of the year. Make it personal, faith-stretching, and community-building. Anchor in scripture. JSON: {"prompt":"...","scripture":"...","ref":"...","theme":"..."}`,'team');
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const norm = normalizeWeekPrompt(d);
    if(!norm) throw new Error('AI returned an incomplete week prompt');
    saveLocal('wp_'+wk, norm); ST.weekPrompt = norm; return norm;
  } catch(_){
    // AI path failed. Fall back to the Bishop-configured row in
    // rf_network_config — content authored by the Bishop, not by the app.
    // If he hasn't set one yet, return null and the renderer shows nothing.
    return await getBishopConfiguredWeekPrompt();
  }
}

async function getMonthChallenge(){
  const mo=new Date().toISOString().slice(0,7);
  purgeStaleAIKeys('mc_', mo);
  const cached=loadLocal('mc_'+mo);
  const isValidChallenge = (d) => d && typeof d==='object'
    && typeof d.title==='string'  && d.title.trim().length > 0
    && typeof d.goal==='string'   && d.goal.trim().length > 0
    && typeof d.scripture==='string' && d.scripture.trim().length > 0
    && typeof d.ref==='string'    && d.ref.trim().length > 0;
  if(isValidChallenge(cached)){ ST.monthChallenge=cached; return cached; }
  try {
    const raw=await aiCall(`Generate a monthly ministry team challenge for ${monthStr()} for the ${C.networkName} network of pastors. Actionable, measurable, spiritually significant — something each pastor can do in their own context. JSON: {"title":"...","goal":"...","action":"...","scripture":"...","ref":"..."}`,'team');
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(!isValidChallenge(d)) throw new Error('AI returned an incomplete monthly challenge');
    saveLocal('mc_'+mo,d); ST.monthChallenge=d; return d;
  } catch(_){
    // AI path failed. Fall back to the Bishop-configured row in
    // rf_network_config (default_month_challenge). Empty until Bishop sets
    // it via SQL Editor; then this returns the parsed JSON.
    try {
      const rows = await sbS('rf_network_config',{select:'value', key:'eq.default_month_challenge'});
      const rawCfg = rows?.[0]?.value;
      if(!rawCfg || !rawCfg.trim()) return null;
      const parsed = JSON.parse(rawCfg);
      return isValidChallenge(parsed) ? parsed : null;
    } catch(_){ return null; }
  }
}

// ============================================================
const bioAvail = async () => typeof PublicKeyCredential!=='undefined' && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.().catch(()=>false);

async function registerBio(userId,name){
  try {
    if(!await bioAvail()) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:C.networkName,id:location.hostname},user:{id:new TextEncoder().encode(userId),name,displayName:name},pubKeyCredParams:[{alg:-7,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
    if(!cred) return false;
    saveLocal('bio_'+userId, btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    return true;
  } catch(e){ return false; }
}

async function verifyBio(userId){
  try {
    const stored=loadLocal('bio_'+userId); if(!stored) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const id=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
    const a=await navigator.credentials.get({publicKey:{challenge:ch,rpId:location.hostname,allowCredentials:[{type:'public-key',id}],userVerification:'required',timeout:60000}});
    return !!a;
  } catch(e){ return false; }
}

const NAV={history:[],backTaps:0,backTimer:null};
const ROOT_SCREENS=new Set(['s-login','s-home']);
function updateBackFab(id){
  const fab=document.getElementById('back-fab');
  if(!fab) return;
  if(ROOT_SCREENS.has(id)) fab.classList.remove('visible');
  else fab.classList.add('visible');
}
function backFabClick(){
  if(goBack()) return;
  const cur=document.querySelector('#app .screen.active');
  if(cur && cur.id!=='s-home' && cur.id!=='s-login'){
    go(ST.session?'s-home':'s-login');
  }
}
function go(id,skipPush){
  const guarded=['s-home','s-team','s-prayer','s-wins','s-profile','s-checkin','s-dm','s-ann','s-bishop-profile','s-apostle-eraka','s-outreach','s-pastor-view','s-fasts','s-events','s-devotion'];
  if(guarded.includes(id) && !ST.session){ go('s-login'); return; }
  const prev=document.querySelector('#app .screen.active');
  if(prev&&prev.id===id) return;
  if(prev&&!skipPush) NAV.history.push(prev.id);
  if(!skipPush) history.pushState({screen:id},'','');
  document.querySelectorAll('#app .screen').forEach(s=>s.classList.remove('active'));
  const s=$(id); if(s){ s.classList.add('active'); onScreen(id); }
  updateBackFab(id);
  applyTheme();
}
function goBack(){
  if(NAV.history.length){
    const prev=NAV.history.pop();
    if(typeof prev==='object'&&prev.type==='dashboard') bishopBackToDashboard();
    else if(typeof prev==='object'&&prev.type==='bishop') switchBishopPanel(prev.panel,true);
    else go(prev,true);
    return true;
  }
  return false;
}
window.addEventListener('popstate',function(e){
  if(goBack()) return;
  // On root screen — require triple-tap to exit
  NAV.backTaps++;
  if(NAV.backTaps<3){
    history.pushState({screen:'hold'},'','');
    const remaining=3-NAV.backTaps;
    showOnlineToast('Tap back '+(remaining===1?'once more':remaining+' more times')+' to exit');
    clearTimeout(NAV.backTimer);
    NAV.backTimer=setTimeout(()=>{NAV.backTaps=0;},1500);
  }
});
function onScreen(id){
  if(id==='s-home') loadHome();
  else if(id==='s-team') loadTeam();
  else if(id==='s-prayer') loadPrayer();
  else if(id==='s-wins') loadWins();

async function submitWinComment(winId){
  const inp = $('win-comment-input-'+winId); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  if(!ST.session?.userId){ return; }
  try {
    await sbI('rf_win_comments',{
      win_id: winId,
      pastor_id: ST.session.userId,
      pastor_name: ST.session.name || null,
      avatar_url: ST.profile?.avatar_url || null,
      comment_text: text
    });
    inp.value = '';
    await renderWinComments(winId);
    // Refresh the count badge in the comment button
    loadWins();
  } catch(e){ inp.placeholder='Could not post — try again'; }
}

        <div class="err" id="fast-err"></div>
        <button class="fsub" id="fast-declare-btn" onclick="declareFast()">Declare fast &rarr;</button>
      </div>` : '';
    const nowMs=Date.now();
    const active=fasts.filter(f=>{
      const s=new Date(f.start_date).getTime(), e=new Date(f.end_date).getTime()+86400000;
      return nowMs>=s && nowMs<=e;
    });
    const upcoming=fasts.filter(f=>new Date(f.start_date).getTime()>nowMs);
    const past=fasts.filter(f=>new Date(f.end_date).getTime()+86400000<nowMs);
    const dayMs=86400000;
    const canManage=isDashboardUser();
    const renderFast=(f,label)=>{
      const mine=ST.session?.userId && parts.find(p=>p.fast_id===f.id&&p.pastor_id===ST.session.userId);
      const joined=parts.filter(p=>p.fast_id===f.id);
      const breakthroughs=joined.filter(p=>p.breakthrough_text&&p.breakthrough_text.trim());
      const startMs=new Date(f.start_date).getTime();
      const endMs=new Date(f.end_date).getTime();
      const totalDays=Math.round((endMs-startMs)/dayMs)+1;
      const dayIdx=Math.floor((nowMs-startMs)/dayMs)+1;
      const isActive=nowMs>=startMs && nowMs<=endMs+dayMs;
      const dayCounter=isActive && totalDays>1 ? `Day ${Math.max(1,Math.min(dayIdx,totalDays))} of ${totalDays}` : '';
      const progressPct=isActive && totalDays>1 ? Math.max(0,Math.min(100,((nowMs-startMs)/(endMs+dayMs-startMs))*100)) : 0;
      const avatarStack=joined.slice(0,5).map((p,i)=>{
        const init=(p.pastor_name||'?').trim().charAt(0).toUpperCase();
        const img=p.avatar_url?`<img src="${esc(p.avatar_url)}" style="width:100%;height:100%;object-fit:cover">`:init;
        return `<div title="${esc(p.pastor_name||'')}" style="width:24px;height:24px;border-radius:50%;background:var(--gold3);border:2px solid var(--ink2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold);font-weight:600;overflow:hidden;margin-left:${i===0?0:-8}px">${img}</div>`;
      }).join('');
      const overflow=joined.length>5?`<div style="width:24px;height:24px;border-radius:50%;background:var(--ink3);border:2px solid var(--ink2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mist);margin-left:-8px">+${joined.length-5}</div>`:'';
      return `<div class="pw-item" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:20px">🕯️</div>
          <div style="flex:1;min-width:0">
            <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--frost)">${esc(f.title||'Fast')}</div>
            <div style="font-size:11px;color:var(--mist)">${esc(f.start_date)} &rarr; ${esc(f.end_date)}${f.fast_type?' &middot; '+esc(f.fast_type):''}</div>
          </div>
          ${label?`<span class="pill pill-gold">${label}</span>`:''}
        </div>
        ${dayCounter?`<div style="font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">${dayCounter}</div>
          <div style="height:4px;background:var(--gold4);border-radius:2px;overflow:hidden;margin-bottom:10px"><div style="height:100%;width:${progressPct}%;background:var(--gold)"></div></div>`:''}
        ${f.description?`<div style="font-size:13px;color:var(--mist);line-height:1.6;margin-bottom:8px;white-space:pre-wrap">${esc(f.description)}</div>`:''}
        ${f.scripture_ref?`<div style="border-left:2px solid var(--gold);padding:6px 10px;margin-bottom:10px;background:var(--gold4);border-radius:0 var(--rs) var(--rs) 0"><div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold2);font-style:italic">${esc(f.scripture_ref)}</div></div>`:''}
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          ${joined.length?`<div style="display:flex;align-items:center">${avatarStack}${overflow}</div>`:''}
          <div style="font-size:11px;color:var(--gold)">🙏 ${joined.length} ${joined.length===1?'pastor':'pastors'} in agreement</div>
        </div>
        ${ST.session?.role==='pastor' && !mine ? `<button class="pw-act on" onclick="joinFast('${f.id}',this)">Count me in</button>`:''}
        ${mine ? `
          <div style="margin-top:8px;padding:8px;background:var(--ink3);border-radius:var(--rs)">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div style="flex:1;font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase">You're in agreement</div>
              <button class="pw-act" onclick="leaveFast('${f.id}')" style="font-size:10px;color:var(--mist)">Withdraw</button>
            </div>
            ${mine.breakthrough_text ? `<div style="font-size:12px;color:var(--mist);line-height:1.5;margin-bottom:6px;white-space:pre-wrap;font-style:italic">"${esc(mine.breakthrough_text)}"</div>` : ''}
            <div id="bt-wrap-${f.id}" style="display:none">
              <textarea class="fin" id="bt-${f.id}" style="margin-bottom:6px;min-height:50px;font-size:12px" placeholder="Share a breakthrough or testimony…">${esc(mine.breakthrough_text||'')}</textarea>
              <button class="pw-act" onclick="saveBreakthrough('${f.id}')">Save testimony</button>
            </div>
            <button class="pw-act" onclick="toggleBreakthrough('${f.id}')" id="bt-toggle-${f.id}">${mine.breakthrough_text?'Edit testimony':'Share a testimony'}</button>
          </div>
        ` : ''}
        ${breakthroughs.length?`<div style="margin-top:10px">
          <div style="font-size:10px;color:var(--ash);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Breakthroughs</div>
          ${breakthroughs.map(b=>`<div style="background:var(--ink3);border-left:2px solid var(--gold);padding:8px 10px;border-radius:var(--rs);margin-bottom:6px">
            <div style="font-size:11px;color:var(--gold);font-weight:500">${esc(b.pastor_name||'Pastor')}</div>
            <div style="font-size:12px;color:var(--mist);line-height:1.5;margin-top:2px;white-space:pre-wrap">${esc(b.breakthrough_text)}</div>
          </div>`).join('')}
        </div>`:''}
        ${canManage?`<div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--br)">
          <button class="pw-act" onclick="editFast('${f.id}')" style="font-size:11px">Edit</button>
          <button class="pw-act danger" onclick="deleteFast('${f.id}')" style="font-size:11px">Delete</button>
        </div>`:''}
      </div>`;
    };
    const pastHtml = past.length
      ? `<div class="flbl" style="margin-top:10px">Past</div>`
        + past.slice(0, ST.fastsPastShown||5).map(f=>renderFast(f,'')).join('')
        + (past.length>(ST.fastsPastShown||5)?`<button class="pw-act" onclick="ST.fastsPastShown=(ST.fastsPastShown||5)+10;loadFasts()" style="margin-top:6px">Show more past fasts</button>`:'')
      : '';
    const emptyState = fasts.length===0
      ? (canManage
          ? '<div class="empty" style="padding:24px 16px"><div style="font-size:32px;margin-bottom:8px">🕯️</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:16px;color:var(--frost);margin-bottom:4px">Call the network to consecration</div><div style="font-size:12px;color:var(--mist)">Declare a fast above and rally the pastors to stand in agreement.</div></div>'
          : '<div class="empty" style="padding:24px 16px"><div style="font-size:32px;margin-bottom:8px">🕯️</div><div style="font-size:13px;color:var(--mist)">No fasts called right now. The Bishop will notify you when the network is called to consecration.</div></div>')
      : '';
    body.innerHTML=composer
      +(active.length?`<div class="flbl" style="margin-top:10px">Active now</div>${active.map(f=>renderFast(f,'LIVE')).join('')}`:'')
      +(upcoming.length?`<div class="flbl" style="margin-top:10px">Upcoming</div>${upcoming.map(f=>renderFast(f,'')).join('')}`:'')
      +pastHtml
      +emptyState;
  } catch(e){ body.innerHTML='<div class="empty">Could not load fasts.</div>'; }
}

async function declareFast(){
  const btn=$('fast-declare-btn'); if(btn){ btn.disabled=true; btn.textContent='Declaring...'; }
  const data={
    title:$('fast-title')?.value.trim(),
    description:$('fast-desc')?.value.trim()||null,
    start_date:$('fast-start')?.value,
    end_date:$('fast-end')?.value,
    fast_type:$('fast-type')?.value||null,
    scripture_ref:$('fast-scripture')?.value.trim()||null,
    declared_by:ST.session?.name||null
  };
  if(!data.title || !data.start_date || !data.end_date){
    showErr('fast-err','Title and dates are required.');
    if(btn){ btn.disabled=false; btn.textContent='Declare fast →'; }
    return;
  }
  try {
    await sbI('rf_fasts',data);
    audit('FAST_DECLARED',{table:'rf_fasts',title:data.title});
    firePushNotify('blast',{message_text:'📣 The Bishop has declared a fast: '+data.title}).catch(()=>{});
    loadFasts();
  } catch(e){ showErr('fast-err','Could not declare. Try again.'); if(btn){ btn.disabled=false; btn.textContent='Declare fast →'; } }
}

async function joinFast(id,btn){
  if(!ST.session?.userId) return;
  if(btn){ btn.disabled=true; btn.textContent='Joining...'; }
  try {
    const existing=await sbS('rf_fast_participants',{select:'id',fast_id:'eq.'+id,pastor_id:'eq.'+ST.session.userId});
    if(existing.length){ loadFasts(); return; }
    await sbI('rf_fast_participants',{fast_id:id,pastor_id:ST.session.userId,pastor_name:ST.session.name||null,avatar_url:ST.profile?.avatar_url||null});
    audit('FAST_JOINED',{table:'rf_fast_participants',fast_id:id});
    loadFasts();
  } catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Could not join — retry'; }
  }
}

async function leaveFast(id){
  if(!ST.session?.userId) return;
  if(!confirm('Withdraw from this fast? You can rejoin later.')) return;
  try {
    await sbD('rf_fast_participants',`fast_id=eq.${id}&pastor_id=eq.${ST.session.userId}`);
    audit('FAST_LEFT',{table:'rf_fast_participants',fast_id:id});
    loadFasts();
  } catch(e){ alert('Could not withdraw — try again.'); }
}

function toggleBreakthrough(fastId){
  const wrap=$('bt-wrap-'+fastId); const toggle=$('bt-toggle-'+fastId);
  if(!wrap) return;
  const show=wrap.style.display==='none';
  wrap.style.display=show?'block':'none';
  if(toggle) toggle.style.display=show?'none':'inline-block';
  if(show){ const ta=$('bt-'+fastId); if(ta) ta.focus(); }
}

async function saveBreakthrough(fastId){
  const ta=$('bt-'+fastId); if(!ta) return;
  const text=ta.value.trim(); if(!text) return;
  try {
    await sbU('rf_fast_participants',`fast_id=eq.${fastId}&pastor_id=eq.${ST.session.userId}`,{breakthrough_text:text,breakthrough_at:new Date().toISOString()});
    audit('FAST_BREAKTHROUGH',{table:'rf_fast_participants',fast_id:fastId});
    loadFasts();
  } catch(e){ ta.placeholder='Could not save — try again'; }
}

async function editFast(id){
  if(!isDashboardUser()) return;
  try {
    const rows=await sbS('rf_fasts',{select:'*',id:'eq.'+id});
    if(!rows.length) return;
    const f=rows[0];
    const title=window.prompt('Title',f.title||''); if(title===null) return;
    const desc=window.prompt('Purpose / description',f.description||''); if(desc===null) return;
    const start=window.prompt('Start date (YYYY-MM-DD)',f.start_date||''); if(start===null) return;
    const end=window.prompt('End date (YYYY-MM-DD)',f.end_date||''); if(end===null) return;
    const scripture=window.prompt('Scripture reference',f.scripture_ref||''); if(scripture===null) return;
    await sbU('rf_fasts','id=eq.'+id,{title:title.trim(),description:desc.trim()||null,start_date:start.trim(),end_date:end.trim(),scripture_ref:scripture.trim()||null});
    audit('FAST_EDITED',{table:'rf_fasts',fast_id:id});
    loadFasts();
  } catch(e){ alert('Could not update fast.'); }
}

async function deleteFast(id){
  if(!isDashboardUser()) return;
  if(!confirm('Delete this fast? Participants and breakthroughs will be removed too.')) return;
  try {
    await sbD('rf_fast_participants','fast_id=eq.'+id);
    await sbD('rf_fasts','id=eq.'+id);
    audit('FAST_DELETED',{table:'rf_fasts',fast_id:id});
    loadFasts();
  } catch(e){ alert('Could not delete.'); }
}

// ============================================================
// EVENTS / CALENDAR — dynamic month grid
// ============================================================
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return ymd(new Date()); }

async function loadEvents(){
  const body=$('events-body'); if(!body) return;
  body.innerHTML=loading();
  if(!ST.calendarFocus){
    const t=new Date();
    ST.calendarFocus={year:t.getFullYear(),month:t.getMonth()};
  }
  if(!ST.selectedEventDate) ST.selectedEventDate=todayStr();
  try {
    ST.allEvents = await sbS('rf_events',{select:'*',order:'event_date.asc'});
    renderEventsScreen();
  } catch(e){ body.innerHTML='<div class="empty">Could not load events.</div>'; }
}

function renderEventsScreen(){
  const body=$('events-body'); if(!body) return;
  const events = ST.allEvents || [];
  const {year,month} = ST.calendarFocus;
  const firstOfMonth = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0).getDate();
  const startWeekday = firstOfMonth.getDay();
  const monthName = firstOfMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const today = todayStr();

  // Build a set of date strings that have events
  const eventsByDay = {};
  for(const e of events){
    (eventsByDay[e.event_date] = eventsByDay[e.event_date] || []).push(e);
  }

  // Grid cells
  const cells = [];
  for(let i=0;i<startWeekday;i++) cells.push(null);
  for(let d=1; d<=lastDay; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d, dateStr, events: eventsByDay[dateStr] || []});
  }
  while(cells.length % 7 !== 0) cells.push(null);

  const weekdays = ['S','M','T','W','T','F','S'];
  const selectedEvents = ST.selectedEventDate ? (eventsByDay[ST.selectedEventDate] || []) : [];
  const selectedLabel = ST.selectedEventDate
    ? new Date(ST.selectedEventDate+'T00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
    : '';

  body.innerHTML = `
    <div style="background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button class="pw-act" type="button" onclick="calendarPrev()" aria-label="Previous month">‹</button>
        <div style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--frost)">${monthName}</div>
        <button class="pw-act" type="button" onclick="calendarNext()" aria-label="Next month">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
        ${weekdays.map(d=>`<div style="text-align:center;font-size:10px;color:var(--ash);font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${cells.map(c=>{
          if(!c) return '<div></div>';
          const isToday = c.dateStr === today;
          const isSelected = c.dateStr === ST.selectedEventDate;
          const hasEvents = c.events.length > 0;
          const bg = isSelected ? 'var(--gold)' : isToday ? 'var(--gold3)' : 'var(--ink3)';
          const fg = isSelected ? 'var(--ink)' : isToday ? 'var(--gold)' : 'var(--frost)';
          const brd = isToday && !isSelected ? 'border:1px solid var(--gold)' : 'border:0.5px solid var(--br)';
          return `<div onclick="selectCalendarDay('${c.dateStr}')" style="aspect-ratio:1;min-height:36px;${brd};border-radius:var(--rs);background:${bg};color:${fg};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:${isToday||isSelected?'700':'400'};position:relative">
            ${c.day}
            ${hasEvents && !isSelected ? '<div style="width:4px;height:4px;border-radius:50%;background:var(--gold);margin-top:2px"></div>' : ''}
            ${hasEvents && isSelected ? `<div style="font-size:9px;margin-top:1px">${c.events.length}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:center;margin-top:10px">
        <button class="pw-act" type="button" onclick="calendarToday()">Today</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--gold);flex:1;min-width:0">${esc(selectedLabel)}</div>
      ${ST.session ? `<button class="fsub" type="button" style="width:auto;padding:8px 14px;font-size:12px" onclick="openEventCompose()">+ Add Event</button>` : ''}
    </div>

    <div id="event-compose-wrap"></div>

    <div id="event-day-list">
      ${selectedEvents.length ? selectedEvents.map(renderEventCard).join('') : '<div class="empty">Nothing on this day yet. Tap + Add Event to post something.</div>'}
    </div>
  `;
}

function renderEventCard(e){
  const canDelete = ST.session && (isDashboardUser() || ST.session.userId===e.pastor_id);
  return `<div class="pw-item" style="margin-bottom:10px">
    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="background:var(--gold3);border:0.5px solid var(--gold);border-radius:var(--rs);padding:8px 10px;text-align:center;flex-shrink:0;min-width:50px">
        <div style="font-size:10px;color:var(--gold);text-transform:uppercase">${new Date(e.event_date+'T00:00').toLocaleDateString('en-US',{month:'short'})}</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1">${new Date(e.event_date+'T00:00').getDate()}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--frost)">${esc(e.title||'Event')}</div>
        ${e.event_type?`<div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-top:2px">${esc(e.event_type)}</div>`:''}
        ${e.event_time?`<div style="font-size:12px;color:var(--mist);margin-top:4px">🕒 ${esc(e.event_time)}</div>`:''}
        ${e.location?`<div style="font-size:12px;color:var(--mist);margin-top:2px">${e.is_virtual?'💻':'📍'} ${esc(e.location)}</div>`:''}
        ${e.end_date&&e.end_date!==e.event_date?`<div style="font-size:11px;color:var(--ash);margin-top:2px">Through ${esc(e.end_date)}</div>`:''}
        ${e.description?`<div style="font-size:12px;color:var(--mist);margin-top:6px;line-height:1.5;white-space:pre-wrap">${esc(e.description)}</div>`:''}
        ${e.location_url?`<a href="${esc(e.location_url)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--gold)">Open link →</a>`:''}
        ${(e.pastor_name||e.church_name)?`<div style="font-size:11px;color:var(--ash);margin-top:8px;border-top:0.5px dashed var(--br);padding-top:6px">Posted by ${esc(e.pastor_name||'Network')}${e.church_name?` · ${esc(e.church_name)}`:''}</div>`:''}
      </div>
    </div>
    ${canDelete?`<div class="pw-actions" style="margin-top:8px"><button class="pw-act danger" onclick="deleteEvent('${e.id}')">Remove</button></div>`:''}
  </div>`;
}

function calendarPrev(){
  const f=ST.calendarFocus; let m=f.month-1,y=f.year;
  if(m<0){m=11;y--;}
  ST.calendarFocus={year:y,month:m};
  renderEventsScreen();
}
function calendarNext(){
  const f=ST.calendarFocus; let m=f.month+1,y=f.year;
  if(m>11){m=0;y++;}
  ST.calendarFocus={year:y,month:m};
  renderEventsScreen();
}
function calendarToday(){
  const t=new Date();
  ST.calendarFocus={year:t.getFullYear(),month:t.getMonth()};
  ST.selectedEventDate=todayStr();
  renderEventsScreen();
}
function selectCalendarDay(dateStr){
  ST.selectedEventDate=dateStr;
  renderEventsScreen();
}
