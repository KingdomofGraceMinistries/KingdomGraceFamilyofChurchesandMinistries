<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pastoral Network">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/jpeg" sizes="48x48" href="/icons/kg-logo.jpg">
<link rel="icon" type="image/svg+xml" href="/icons/icon-512.svg">
<link rel="apple-touch-icon" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/kg-logo.jpg">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/kg-logo.jpg">
<title>Pastoral Network</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#0a0a0f;--ink2:#12121a;--ink3:#1c1c28;--ink4:#252535;
  --gold:#c8a84c;--gold2:#e8c86a;--gold3:rgba(201,168,76,0.14);--gold4:rgba(201,168,76,0.07);
  --frost:#f8f6f0;--mist:#a8a090;--ash:#6a6458;
  --flame:#e85d3a;--sage:#4a8c6a;--sky:#3a6ea8;
  --br:rgba(201,168,76,0.18);--brh:rgba(201,168,76,0.38);
  --r:16px;--rm:12px;--rs:8px;
}
html,body{height:100%;background:var(--ink);color:var(--frost);font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;background:var(--ink);}

/* PASTOR — SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;animation:fadeIn 0.22s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:0 18px 90px;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--br);}

/* BISHOP — FULL VIEWPORT DASHBOARD */
#bishop-app{display:none;width:100%;height:100%;overflow-y:auto;background:var(--ink);}
#bishop-app.active{display:flex;flex-direction:column;}
#bishop-app::-webkit-scrollbar{width:4px;}
#bishop-app::-webkit-scrollbar-thumb{background:var(--br);}
.b-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 16px;border-bottom:0.5px solid var(--br);background:var(--ink);position:sticky;top:0;z-index:10;}
.b-logo{display:flex;align-items:center;gap:12px;}
.b-crown{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.b-network{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--frost);}
.b-role{font-size:10px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.b-nav{display:flex;gap:6px;align-items:center;}
.b-tab{padding:7px 14px;border-radius:var(--rm);border:0.5px solid var(--br);font-size:12px;color:var(--mist);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.b-tab:hover{border-color:var(--gold);color:var(--gold);}
.b-tab.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);font-weight:500;}
.b-signout{padding:7px 14px;border-radius:var(--rm);border:0.5px solid rgba(232,93,58,0.3);font-size:12px;color:var(--flame);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;}
.b-body{padding:24px;flex:1;max-width:1200px;margin:0 auto;width:100%;}
.b-panel{display:none;}
.b-panel.active{display:block;animation:fadeIn 0.2s ease;}

/* BISHOP — STAT STRIP */
.b-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:600px){.b-stats{grid-template-columns:repeat(2,1fr);}}
.b-stat{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px 18px;}
.b-stat-num{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--frost);line-height:1;}
.b-stat-num.red{color:var(--flame);}
.b-stat-num.amber{color:var(--gold);}
.b-stat-num.green{color:#4ade80;}
.b-stat-lbl{font-size:11px;color:var(--ash);margin-top:4px;letter-spacing:0.3px;}

/* BISHOP — PASTOR GRID */
.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.b-pastor-card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.b-pastor-card:hover{border-color:var(--brh);transform:translateY(-1px);}
.b-pastor-card.risk-red{border-color:rgba(232,93,58,0.4);background:rgba(232,93,58,0.04);}
.b-pastor-card.risk-amber{border-color:rgba(201,168,76,0.3);}
.b-pastor-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.b-pastor-av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;}
.b-pastor-av-init{width:46px;height:46px;border-radius:50%;background:var(--ink3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;}
.b-pastor-name{font-size:14px;font-weight:500;color:var(--frost);margin-bottom:2px;}
.b-pastor-church{font-size:11px;color:var(--mist);}
.b-burnout-bar{height:4px;border-radius:2px;background:var(--ink4);overflow:hidden;margin-bottom:8px;}
.b-burnout-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
.fill-green{background:#4ade80;}
.fill-amber{background:var(--gold);}
.fill-red{background:var(--flame);}
.b-pastor-meta{display:flex;justify-content:space-between;align-items:center;}
.b-pastor-last{font-size:10px;color:var(--ash);}

/* BISHOP — DRILL DOWN PANEL */
.b-drill{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-drill-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.b-drill-av{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);}
.b-drill-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--frost);}
.b-drill-church{font-size:12px;color:var(--gold);margin-top:2px;}
.b-section-title{font-size:11px;color:var(--ash);letter-spacing:1.2px;text-transform:uppercase;margin:20px 0 10px;}

/* BISHOP — ENGAGEMENT CHART */
.b-chart{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.b-chart-title{font-size:12px;color:var(--mist);margin-bottom:16px;font-weight:500;}
.b-bars{display:flex;align-items:flex-end;gap:6px;height:80px;}
.b-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.b-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s ease;}
.b-bar-lbl{font-size:9px;color:var(--ash);}
.b-heat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--br);}
.b-heat-row:last-child{border-bottom:none;}
.b-heat-name{font-size:13px;color:var(--frost);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.b-heat-dots{display:flex;gap:3px;}
.b-heat-dot{width:14px;height:14px;border-radius:3px;}

/* BISHOP — INBOX */
.b-dm-list{max-height:400px;overflow-y:auto;padding-right:4px;}
.b-dm-list::-webkit-scrollbar{width:2px;}
.b-dm-list::-webkit-scrollbar-thumb{background:var(--br);}
.b-dm-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--br);cursor:pointer;}
.b-dm-item:hover{opacity:0.8;}
.b-dm-item.unread .b-dm-preview{color:var(--frost);}
.b-dm-preview{font-size:12px;color:var(--mist);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.b-dm-time{font-size:10px;color:var(--ash);margin-left:auto;flex-shrink:0;}
.b-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}

/* BISHOP — COMPOSE */
.b-compose{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:18px;margin-bottom:16px;}
.b-compose-title{font-size:13px;font-weight:500;color:var(--frost);margin-bottom:12px;}
.b-target-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.b-chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--mist);cursor:pointer;}
.b-chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}

/* ── SHARED PASTOR STYLES ── */
.tnav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:var(--ink);border-bottom:0.5px solid var(--br);flex-shrink:0;}
.tnav-logo{display:flex;align-items:center;gap:10px;}
.tnav-mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;flex-shrink:0;}
.tnav-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--frost);}
.tnav-sub{font-size:10px;color:var(--mist);}
.tnav-btn{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:6px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.tnav-btn:hover{border-color:var(--gold);color:var(--gold);}
.bnav{display:flex;background:var(--ink2);border-top:0.5px solid var(--br);flex-shrink:0;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;cursor:pointer;}
.bn-ic{font-size:18px;line-height:1;}
.bn-lb{font-size:9px;color:var(--mist);}
.bn.on .bn-lb{color:var(--gold);}
.bn.on .bn-ic{filter:drop-shadow(0 0 4px rgba(201,168,76,0.5));}
.flbl{font-size:11px;color:var(--mist);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;display:block;}
.fin{width:100%;background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--rm);padding:12px 14px;color:var(--frost);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.fin:focus{border-color:var(--gold);}
textarea.fin{resize:vertical;min-height:80px;}
.fsub{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--rm);padding:14px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;}
.fsub:hover{opacity:0.9;}
.fsub:disabled{opacity:0.4;cursor:not-allowed;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{background:var(--ink3);border:0.5px solid var(--br);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--mist);cursor:pointer;transition:all 0.15s;}
.chip.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.card{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--frost);margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--mist);line-height:1.5;}
.pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;letter-spacing:0.3px;}
.pill-gold{background:var(--gold3);color:var(--gold);border:0.5px solid rgba(201,168,76,0.3);}
.pill-red{background:rgba(232,93,58,0.12);color:var(--flame);border:0.5px solid rgba(232,93,58,0.3);}
.pill-green{background:rgba(74,140,106,0.15);color:#4ade80;border:0.5px solid rgba(74,140,106,0.3);}
.pill-mist{background:rgba(168,160,144,0.1);color:var(--mist);border:0.5px solid rgba(168,160,144,0.2);}
.pw-item{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--rm);padding:14px;margin-bottom:10px;}
.pw-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.pw-name{font-size:13px;font-weight:500;color:var(--frost);}
.pw-time{font-size:10px;color:var(--ash);}
.pw-body{font-size:13px;color:var(--mist);line-height:1.6;}
.pw-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pw-act{background:transparent;border:0.5px solid var(--br);border-radius:var(--rs);padding:5px 12px;font-size:11px;color:var(--mist);cursor:pointer;font-family:'DM Sans',sans-serif;}
.pw-act:hover{border-color:var(--gold);color:var(--gold);}
.pw-act.on{background:var(--gold3);border-color:var(--gold);color:var(--gold);}
.pw-act.danger{border-color:rgba(232,93,58,0.4);color:var(--flame);}
.pulse-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0;}
.pulse-btn{aspect-ratio:1;border-radius:var(--rs);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:0.5px solid var(--br);background:var(--ink3);transition:all 0.15s;font-size:18px;}
.pulse-btn.sel{border-color:var(--gold);background:var(--gold3);}
.pulse-label{font-size:9px;color:var(--mist);}
.pulse-btn.sel .pulse-label{color:var(--gold);}
.auth-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;}
.auth-mark{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:var(--ink);font-family:'Cormorant Garamond',serif;margin:0 auto 20px;}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--frost);text-align:center;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--mist);text-align:center;line-height:1.6;margin-bottom:28px;}
.bio-btn{width:100%;background:var(--ink3);border:0.5px solid var(--brh);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s;}
.bio-btn:hover{border-color:var(--gold);}
.bio-icon{width:44px;height:44px;border-radius:50%;background:var(--gold3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.bio-label{font-size:14px;font-weight:500;color:var(--frost);}
.bio-sub{font-size:11px;color:var(--mist);margin-top:2px;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.pin-key{background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--rm);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:var(--frost);cursor:pointer;transition:all 0.1s;font-family:'DM Sans',sans-serif;}
.pin-key:active{background:var(--ink4);transform:scale(0.95);}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:8px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--br);transition:all 0.15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.err{background:rgba(232,93,58,0.1);border:0.5px solid rgba(232,93,58,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--flame);margin-bottom:12px;display:none;}
.ok-msg{background:rgba(74,140,106,0.1);border:0.5px solid rgba(74,140,106,0.3);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:#4ade80;margin-bottom:12px;display:none;}
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(232,93,58,0.95);color:#fff;text-align:center;padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transform:translateY(-100%);transition:transform 0.3s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.offline-bar.show{transform:translateY(0);}
.offline-bar .sync-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:var(--rs);padding:3px 10px;font-size:11px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;}
.online-toast{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(74,140,106,0.95);color:#fff;text-align:center;padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;transform:translateY(-100%);transition:transform 0.3s ease;}
.online-toast.show{transform:translateY(0);}

/* NOTIFICATION SYSTEM */
.notif-toast{position:fixed;top:12px;right:12px;left:12px;max-width:400px;margin:0 auto;z-index:10000;background:var(--ink2);border:0.5px solid var(--gold);border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:translateY(-120%);transition:transform 0.3s ease;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.notif-toast.show{transform:translateY(0);}
.notif-toast-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.notif-toast-body{flex:1;min-width:0;}
.notif-toast-title{font-size:13px;font-weight:500;color:var(--frost);margin-bottom:2px;}
.notif-toast-msg{font-size:12px;color:var(--mist);line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notif-toast-time{font-size:10px;color:var(--ash);margin-top:3px;}
.notif-toast-close{position:absolute;top:8px;right:10px;font-size:14px;color:var(--ash);cursor:pointer;line-height:1;}
.notif-badge{position:absolute;top:2px;right:50%;transform:translateX(12px);min-width:16px;height:16px;border-radius:8px;background:var(--flame);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;display:none;}
.notif-badge.show{display:flex;}
.bn{position:relative;}
.notif-bell{position:relative;cursor:pointer;font-size:18px;padding:4px;}
.notif-bell .notif-badge{top:-4px;right:-8px;transform:none;}
.notif-drawer{position:fixed;top:0;right:0;bottom:0;width:min(340px,85vw);background:var(--ink);border-left:0.5px solid var(--br);z-index:10001;transform:translateX(100%);transition:transform 0.25s ease;display:flex;flex-direction:column;}
.notif-drawer.open{transform:translateX(0);}
.notif-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;opacity:0;pointer-events:none;transition:opacity 0.25s ease;}
.notif-backdrop.open{opacity:1;pointer-events:auto;}
.notif-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:0.5px solid var(--br);}
.notif-drawer-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--frost);}
.notif-drawer-close{background:none;border:none;font-size:18px;color:var(--mist);cursor:pointer;padding:4px;}
.notif-drawer-list{flex:1;overflow-y:auto;padding:0;}
.notif-drawer-item{display:flex;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--br);cursor:pointer;transition:background 0.15s;}
.notif-drawer-item:hover{background:var(--ink2);}
.notif-drawer-item.unread{background:rgba(201,168,76,0.05);}
.notif-drawer-item .notif-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.notif-drawer-item .notif-content{flex:1;min-width:0;}
.notif-drawer-item .notif-item-title{font-size:13px;font-weight:500;color:var(--frost);}
.notif-drawer-item .notif-item-msg{font-size:12px;color:var(--mist);line-height:1.4;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notif-drawer-item .notif-item-time{font-size:10px;color:var(--ash);margin-top:4px;}
.notif-empty{padding:60px 20px;text-align:center;color:var(--ash);font-size:13px;font-style:italic;}

/* SEARCH */
.search-bar{position:relative;margin-bottom:14px;}
.search-bar input{width:100%;background:var(--ink3);border:0.5px solid var(--br);border-radius:var(--r);padding:11px 14px 11px 36px;color:var(--frost);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.search-bar input:focus{border-color:var(--gold);}
.search-bar input::placeholder{color:var(--ash);}
.search-bar .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--ash);pointer-events:none;}
.search-results{background:var(--ink2);border:0.5px solid var(--br);border-radius:var(--r);max-height:60vh;overflow-y:auto;display:none;}
.search-results.show{display:block;}
.search-group-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);padding:12px 16px 6px;font-weight:500;}

.search-empty{padding:20px;text-align:center;color:var(--ash);font-size:12px;font-style:italic;}
details summary::-webkit-details-marker{display:none;}
details summary::after{content:'▾';margin-left:auto;font-size:10px;color:var(--ash);transition:transform 0.2s;}

// ============================================================

// AI GUARDRAIL
// ============================================================
function GUARDRAIL(){ return `You are a wise, spiritually grounded pastoral care assistant for the ${C.networkName||'ministry'} network.
Your responses must always:
1. Be anchored in scripture and biblical truth — reference specific verses
2. Speak as a seasoned elder — compassionate, direct, never patronizing
3. Never drift into secular psychology, self-help clichés, or motivational fluff
4. Gently redirect despair or negativity back to faith, community, and God's promises
5. Keep responses concise — pastors are busy people
6. Never undermine pastoral authority or church unity
Respond in JSON only when requested. Never add markdown code fencing.`; }

// ============================================================
// STATE
// ============================================================
const ST = {
  session: null,
  profile: null,
  pin: '',
  pinTarget: null,
  selectedPulse: null,
  avatarData: null,
  bishopPanel: 'overview',
  selectedPastorId: null,
  selectedDmPastorId: null,
  weekPrompt: null,
  monthChallenge: null,
  allPastors: [],
};

// ============================================================
// UTILS
// ============================================================
const $  = id => document.getElementById(id);
const el = (tag,cls,html='') => { const e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; };
const showErr = (id,msg) => { const e=$(id); if(!e)return; e.textContent=msg; e.style.display='block'; };
const hideErr = id => { const e=$(id); if(e) e.style.display='none'; };
const showOk  = (id,msg) => { const e=$(id); if(!e)return; if(msg)e.textContent=msg; e.style.display='block'; };
const timeAgo = ts => {
  const s = Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
};
const esc = s => { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
const initials = n => n ? n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??';
const weekNum  = () => { const d=new Date(),j=new Date(d.getFullYear(),0,1); return Math.ceil(((d-j)/86400000+j.getDay()+1)/7); };
const monthStr = () => new Date().toLocaleString('default',{month:'long',year:'numeric'});
const saveLocal = (k,v) => localStorage.setItem(C.appId+'_'+k,JSON.stringify(v));
const loadLocal = k => { try{return JSON.parse(localStorage.getItem(C.appId+'_'+k));}catch{return null;} };
const avHTML = (url,name,size=36) => url
  ? `<img src="${esc(url)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">`

// ============================================================
// SUPABASE
// ============================================================
const SB_API_KEY = () => C.supabasePublishableKey || C.supabaseAnonKey;
const SB_AUTH_TOKEN = () => ST.session?.token || C.supabaseAnonKey;
const SB_HDR = () => ({'Content-Type':'application/json','apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Prefer':'return=representation'});
const SB_GET_HDR = () => ({'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN()});

async function sbI(table,data){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}`,{method:'POST',headers:SB_HDR(),body:JSON.stringify(data)});
  if(!r.ok)throw new Error((await r.json().catch(()=>({}))).message||'Insert failed');
  return r.json();
}
async function sbU(table,filter,data){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:SB_HDR(),body:JSON.stringify(data)});
  if(!r.ok)throw new Error('Update failed');
  return r.json();
}
async function sbD(table,filter){
  await fetch(`${C.supabaseUrl}/rest/v1/${table}?${filter}`,{method:'DELETE',headers:SB_GET_HDR()});
}
async function sbS(table,params){
  const r=await fetch(`${C.supabaseUrl}/rest/v1/${table}?${new URLSearchParams(params)}`,{headers:SB_GET_HDR()});
  if(!r.ok)throw new Error('Select failed');
  return r.json();
}
// ── STORAGE UPLOAD ──
async function storageUpload(bucket, path, file){
  const r=await fetch(`${C.supabaseUrl}/storage/v1/object/${bucket}/${path}`,{
    method:'POST',
    headers:{'apikey':SB_API_KEY(),'Authorization':'Bearer '+SB_AUTH_TOKEN(),'Content-Type':file.type,'x-upsert':'true'},

  });

  return `${C.supabaseUrl}/storage/v1/object/public/${bucket}/${path}`;

// ── AUDIT LOGGER ──
async function audit(eventType, meta={}){
  try {
    const actor=ST.session||{};
    await sbI('rf_audit_log',{
      event_type:eventType,
      actor_id:actor.userId||'anonymous',

async function aiCall(prompt,callType='care'){
  const r=await fetch(`${C.supabaseUrl}/functions/v1/${C.aiProxyFn}`,{
    method:'POST',headers:SB_HDR(),
    body:JSON.stringify({callType,prompt:GUARDRAIL()+'\n\n'+prompt})});
  if(!r.ok)throw new Error('AI error '+r.status);
  const d=await r.json();
  return typeof d==='string'?d:JSON.stringify(d);
}

// ============================================================
// BURNOUT ENGINE
// ============================================================
function burnoutScore(p){
  let s=0;
  const gap = p.last_checkin_at ? (Date.now()-new Date(p.last_checkin_at).getTime())/(86400000) : 14;
  s += Math.min(gap,14)/14*40;
  s += ((5-(p.last_pulse_score||3))/4)*30;
  s += Math.max(0,10-(p.posts_this_week||0)*4);
  return Math.min(100,Math.round(s));
}
function burnoutLevel(score){ return score<33?'green':score<66?'amber':'red'; }
function burnoutLabel(score){ return score<33?'Thriving':score<66?'Watch':'At Risk'; }

async function runBurnoutCheck(){
  if(!ST.profile) return;
  const score = burnoutScore(ST.profile);
  if(score>=60){
    try {
      const raw = await aiCall(`A pastor named ${ST.profile.full_name} may be experiencing ministry burnout. Engagement score: ${score}/100 (higher = more at risk). Write a brief, warm, private encouragement (2-3 sentences) as if from a caring mentor. Reference one specific scripture. Speak directly to them. Do not use clinical terms. JSON: {"message":"...","verse":"...","ref":"..."}`,'care');
      const d = JSON.parse(raw.replace(/```json|```/g,'').trim());
      const banner = $('care-banner');
      if(banner){
        banner.innerHTML=`<div style="font-size:22px;margin-bottom:8px">🕊️</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--frost);margin-bottom:6px">A word for you today</div>
          <div style="font-size:13px;color:var(--mist);line-height:1.6">${esc(d.message)}<br><br><em style="color:var(--gold);font-size:12px">"${esc(d.verse)}" — ${esc(d.ref)}</em></div>`;
        banner.style.display='block';
      }
    } catch(e){ /* burnout prompt failed — non-critical, banner stays hidden */ }
  }
}

// ============================================================

  }
}

    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());

}

// ============================================================
// BIOMETRIC
// ============================================================
const bioAvail = async () => typeof PublicKeyCredential!=='undefined' && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.().catch(()=>false);

async function registerBio(userId,name){
  try {
    if(!await bioAvail()) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:C.networkName,id:location.hostname},user:{id:new TextEncoder().encode(userId),name,displayName:name},pubKeyCredParams:[{alg:-7,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
    if(!cred) return false;
    saveLocal('bio_'+userId, btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    return true;
  } catch(e){ return false; }
}

async function verifyBio(userId){
  try {
    const stored=loadLocal('bio_'+userId); if(!stored) return false;
    const ch=new Uint8Array(32); crypto.getRandomValues(ch);
    const id=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
    const a=await navigator.credentials.get({publicKey:{challenge:ch,rpId:location.hostname,allowCredentials:[{type:'public-key',id}],userVerification:'required',timeout:60000}});
    return !!a;
  } catch(e){ return false; }
}

// ============================================================
// PIN
// ============================================================
let pinBuf='';
function pinPress(v){
  if(v==='del') pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<6) pinBuf+=v;
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<pinBuf.length));
  if(pinBuf.length===6) setTimeout(submitPin,150);
}
async function submitPin(){
  const pin=pinBuf; pinBuf='';
  document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
  if(ST.pinTarget==='bishop'){
    try {
      const cfg=await sbS('rf_network_config',{select:'value',key:'eq.bishop_pin_hash'});
      const storedHash=cfg.length?cfg[0].value:null;
      if(storedHash&&btoa(pin)===storedHash){
        ST.session={userId:'bishop',role:'bishop',name:C.bishopName,token:C.supabaseKey};
        saveLocal('session',ST.session);
        audit('LOGIN_SUCCESS',{method:'pin',role:'bishop'});
        launchBishopDashboard(); initNotifPolling();

    return;
  }
  if(ST.pinTarget==='admin'){
    try {
      const admins=await sbS('rf_admins',{select:'*',pin_hash:'eq.'+btoa(pin),status:'eq.active'});

      } else { showErr('pin-err','Incorrect admin PIN.'); audit('LOGIN_FAILED',{method:'pin',role:'admin'}); }
    } catch(e){ showErr('pin-err','Could not verify. Check connection.'); }
    return;
  }
  // Pastor PIN
  try {
    const rows=await sbS('rf_pastors',{select:'*','pin_hash':'eq.'+btoa(pin),status:'eq.active'});

      const p=rows[0];
      ST.session={userId:p.id,role:'pastor',name:p.full_name,token:C.supabaseKey};
      ST.profile=p; saveLocal('session',ST.session); saveLocal('profile',p);
      audit('LOGIN_SUCCESS',{method:'pin',role:'pastor',table:'rf_pastors',targetId:p.id});
      go('s-home'); initNotifPolling();
    } else { showErr('pin-err','Incorrect PIN.'); audit('LOGIN_FAILED',{method:'pin',role:'pastor'}); }
  } catch(e){ showErr('pin-err','Could not verify. Check connection.'); }
}

// ============================================================
// PASTOR NAVIGATION + BACK BUTTON HANDLING
// ============================================================
const NAV={history:[],backTaps:0,backTimer:null};
function go(id,skipPush){
  const guarded=['s-home','s-team','s-prayer','s-wins','s-profile','s-checkin','s-dm','s-ann','s-bishop-profile','s-apostle-ericka'];
  if(guarded.includes(id) && !ST.session){ go('s-login'); return; }
  const prev=document.querySelector('#app .screen.active');
  if(prev&&prev.id===id) return;
  if(prev&&!skipPush) NAV.history.push(prev.id);
  if(!skipPush) history.pushState({screen:id},'',' ');
  document.querySelectorAll('#app .screen').forEach(s=>s.classList.remove('active'));
  const s=$(id); if(s){ s.classList.add('active'); onScreen(id); }
}
function goBack(){
  if(NAV.history.length){
    const prev=NAV.history.pop();
    if(typeof prev==='object'&&prev.type==='dashboard') bishopBackToDashboard();
    else if(typeof prev==='object'&&prev.type==='bishop') switchBishopPanel(prev.panel,true);
    else go(prev,true);
    return true;
  }
  return false;
}
window.addEventListener('popstate',function(e){
  if(goBack()) return;
  // On root screen — require triple-tap to exit
  NAV.backTaps++;
  if(NAV.backTaps<3){
    history.pushState({screen:'hold'},'',' ');
    const remaining=3-NAV.backTaps;
    showOnlineToast('Tap back '+(remaining===1?'once more':remaining+' more times')+' to exit');
    clearTimeout(NAV.backTimer);
    NAV.backTimer=setTimeout(()=>{NAV.backTaps=0;},1500);
  }
});
function onScreen(id){
  if(id==='s-home') loadHome();
  else if(id==='s-team') loadTeam();
  else if(id==='s-prayer') loadPrayer();
  else if(id==='s-wins') loadWins();
  else if(id==='s-profile') loadProfile();
  else if(id==='s-checkin') loadCheckin();
  else if(id==='s-dm') loadDM();
  else if(id==='s-ann') loadAnnouncements();
}
function logout(){
  audit('LOGOUT',{});
  NAV.history=[];NAV.backTaps=0;
  ST.session=null; ST.profile=null;
  localStorage.removeItem(C.appId+'_session');
  if(NOTIF.pollInterval){ clearInterval(NOTIF.pollInterval); NOTIF.pollInterval=null; }
  $('bishop-app').className='';
  $('app').style.display='';
  go('s-login');
}

async function registerPastor(){
  const name=$('reg-name')?.value.trim(),email=$('reg-email')?.value.trim(),token=$('reg-token')?.value.trim(),pin=$('reg-pin')?.value.trim();
  if(!name){showErr('reg-err','Please enter your name.');return;}
  if(!email){showErr('reg-err','Please enter your email.');return;}
  if(!pin||pin.length<6){showErr('reg-err','PIN must be 6 digits.');return;}
  if(!token){showErr('reg-err','No invite link detected. Ask your Bishop for a new one.');return;}
  const btn=$('reg-btn'); btn.disabled=true; btn.textContent='Setting up...';
  try {
    // Verify invite — match by token (email checked loosely for invites without email)
    const inv=await sbS('rf_invites',{select:'*',token:'eq.'+token});
    if(!inv.length){showErr('reg-err','This invite link is no longer valid. Ask your Bishop for a new one.');btn.disabled=false;btn.textContent='Join ${C.networkShort} →';return;}
    if(inv[0].accepted_at){showErr('reg-err','This invite has already been used.');btn.disabled=false;btn.textContent='Join ${C.networkShort} →';return;}
    // Create pastor
    const rows=await sbI('rf_pastors',{email,full_name:name,pin_hash:btoa(pin),status:'active',posts_this_week:0});
    const p=rows[0];
    // Mark invite as accepted
    await sbU('rf_invites','token=eq.'+token,{accepted_at:new Date().toISOString(),email:email});
    // Try biometric setup silently — if it works, great; if not, PIN is already set
    registerBio(p.id,p.full_name).catch(()=>{});
    // Log in
    ST.session={userId:p.id,role:'pastor',name:p.full_name,token:C.supabaseKey};
    ST.profile=p; saveLocal('session',ST.session); saveLocal('profile',p);
    audit('PASTOR_REGISTERED',{table:'rf_pastors',targetId:p.id,email});
    initNotifPolling();
    go('s-home');
  } catch(e){showErr('reg-err',e.message||'Registration failed.');}
  btn.disabled=false; btn.textContent='Join '+C.networkShort+' →';
}

  const newPin=$('reset-new-pin')?.value.trim();
  if(!code){showErr('reset-err','Enter the reset code.');return;}
  if(!newPin||newPin.length<6){showErr('reset-err','PIN must be 6 digits.');return;}
  try {
    const rows=await sbS('rf_pastors',{select:'id,reset_token,reset_token_expires',email:'eq.'+email,status:'eq.active'});
    if(!rows.length){showErr('reset-err','Pastor not found.');return;}
    const p=rows[0];
    if(!p.reset_token||p.reset_token!==code){showErr('reset-err','Invalid reset code.');return;}
    if(new Date(p.reset_token_expires)<new Date()){showErr('reset-err','Reset code has expired. Request a new one.');return;}
    await sbU('rf_pastors','id=eq.'+p.id,{pin_hash:btoa(newPin),reset_token:null,reset_token_expires:null});
    audit('PIN_RESET_COMPLETE',{table:'rf_pastors',targetId:p.id});
    hideErr('reset-err');
    showOk('reset-ok','PIN updated! You can now sign in.');
    setTimeout(()=>go('s-login'),2000);
  } catch(e){showErr('reset-err','Could not reset PIN.');}
}

}

async function loadBishopEngagement(){
  const panel=$('bp-engagement'); if(!panel) return;
  panel.innerHTML=loading();
  try {
    const pastors=ST.allPastors.length?ST.allPastors:await sbS('rf_pastors',{select:'*',status:'eq.active',order:'full_name.asc'});
    // Query real data: checkins and posts from the last 8 weeks
    const now=new Date();
    const eightWeeksAgo=new Date(now.getTime()-56*24*60*60*1000).toISOString();
    const [checkins,prayers,wins,teamR]=await Promise.all([
      sbS('rf_checkins',{select:'week_number',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_prayer_requests',{select:'created_at',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_wins',{select:'created_at',created_at:'gte.'+eightWeeksAgo}),
      sbS('rf_team_responses',{select:'created_at',created_at:'gte.'+eightWeeksAgo})
    ]);
    const curWeek=weekNum();
    const weekLabels=['Wk-7','Wk-6','Wk-5','Wk-4','Wk-3','Wk-2','Last','This'];
    const weekNums=Array.from({length:8},(_,i)=>curWeek-7+i);
    // Aggregate checkins by week_number
    const ciByWeek={};checkins.forEach(c=>{ciByWeek[c.week_number]=(ciByWeek[c.week_number]||0)+1;});
    // Aggregate posts by ISO week
    function isoWeek(d){const dt=new Date(d);const day=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-day);const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil(((dt-y)/86400000+1)/7);}
    const postsByWeek={};[...prayers,...wins,...teamR].forEach(p=>{const w=isoWeek(p.created_at);postsByWeek[w]=(postsByWeek[w]||0)+1;});
    const engagement=weekNums.map((wn,i)=>({
      label:weekLabels[i],
      checkins:ciByWeek[wn]||0,
      posts:postsByWeek[wn]||0
    }));
    const maxVal=Math.max(pastors.length,1,...engagement.map(e=>Math.max(e.checkins,e.posts)));
    panel.innerHTML=`
      <div class="b-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div class="b-chart">
          <div class="b-chart-title">Team check-in activity — last 8 weeks</div>
          <div class="b-bars">
            ${engagement.map(w=>`<div class="b-bar-wrap">

  } catch(e){showErr('inv-err','Could not create invite.');}

function shareInvite(method, data){
  const decoded=decodeURIComponent(data);
  if(method==='sms'){
    window.open('sms:?body='+data,'_self');
  } else if(method==='share'&&navigator.share){
    navigator.share({title:'Join '+C.networkShort,text:decoded}).catch(()=>{});
  } else if(method==='share'){
    // Fallback — copy to clipboard
    navigator.clipboard.writeText(decoded).then(()=>alert('Message copied! Paste it in a text or email.')).catch(()=>{});
  } else if(method==='copy'){
    navigator.clipboard.writeText(decoded).then(()=>alert('Link copied!')).catch(()=>{});
  }
}

async function addAdmin(){
  const name=$('admin-name')?.value.trim();
  const pin=$('admin-pin')?.value.trim();
  if(!name){showErr('admin-err','Please enter the admin\'s name.');return;}
  if(!pin||pin.length<6){showErr('admin-err','PIN must be 6 digits.');return;}
  try {
    await sbI('rf_admins',{full_name:name,pin_hash:btoa(pin),status:'active'});
    audit('ADMIN_ADDED',{table:'rf_admins',admin_name:name});
    $('admin-name').value=''; $('admin-pin').value='';
    hideErr('admin-err');
    showOk('admin-ok',name+' has been added as an admin. Share their PIN with them: '+pin);
    loadManageAdmins();
  } catch(e){showErr('admin-err','Could not add admin.');}
}

async function removeAdmin(id,btn){
  if(!confirm('Remove this admin? They will no longer be able to log in.')) return;
  try {
    await sbD('rf_admins','id=eq.'+id);
    audit('ADMIN_REMOVED',{table:'rf_admins',targetId:id});
    btn.closest('.pw-item').remove();
  } catch(e){ btn.textContent='Error — retry'; }
}

let searchTimer=null;
function debounceSearch(q, mode){
  clearTimeout(searchTimer);
  const resultsEl=$(mode+'-search-results');
  const contentEl=$(mode==='pastor'?'pastor-home-content':null);
  if(!q.trim()){
    if(resultsEl) resultsEl.classList.remove('show');
    if(contentEl) contentEl.style.display='';
    return;
  }
  searchTimer=setTimeout(()=>runSearch(q.trim(),mode),300);
}

async function runSearch(q, mode){
  const resultsEl=$(mode+'-search-results');
  const contentEl=$(mode==='pastor'?'pastor-home-content':null);
  if(!resultsEl) return;
  resultsEl.innerHTML='<div class="search-empty">Searching...</div>';
  resultsEl.classList.add('show');
  if(contentEl) contentEl.style.display='none';

  const ql=q.toLowerCase();
  const groups=[];

  try {
    // Search prayers
    const prayers=await sbS('rf_prayer_requests',{select:'id,request_text,created_at,rf_pastors:pastor_id(full_name)',status:'eq.active',order:'created_at.desc',limit:'50'});
    const pMatches=prayers.filter(r=>(r.request_text||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(pMatches.length) groups.push({title:'Prayer Requests',icon:'🙏',screen:'s-prayer',items:pMatches.map(r=>({text:r.request_text,meta:(r.rf_pastors?.full_name||'Pastor')+' · '+timeAgo(r.created_at)}))});

    // Search wins
    const wins=await sbS('rf_wins',{select:'id,win_text,created_at,rf_pastors:pastor_id(full_name)',order:'created_at.desc',limit:'50'});
    const wMatches=wins.filter(r=>(r.win_text||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(wMatches.length) groups.push({title:'Wins',icon:'🏆',screen:'s-wins',items:wMatches.map(r=>({text:r.win_text,meta:(r.rf_pastors?.full_name||'Pastor')+' · '+timeAgo(r.created_at)}))});

    // Search announcements
    const anns=await sbS('rf_announcements',{select:'id,title,body,created_at,rf_pastors:pastor_id(full_name)',status:'eq.active',order:'created_at.desc',limit:'50'});
    const aMatches=anns.filter(r=>(r.title||'').toLowerCase().includes(ql)||(r.body||'').toLowerCase().includes(ql)||(r.rf_pastors?.full_name||'').toLowerCase().includes(ql));
    if(aMatches.length) groups.push({title:'Announcements',icon:'📢',screen:'s-ann',items:aMatches.map(r=>({text:r.title||r.body,meta:(r.rf_pastors?.full_name||'Pastor')+' · '+timeAgo(r.created_at)}))});

    // Search DMs
    const uid=ST.session?.userId;
    const dmParams=mode==='bishop'
      ? {select:'id,sender_id,message_text,created_at',order:'created_at.desc',limit:'50'}
      : {select:'id,sender_id,message_text,created_at',or:`sender_id.eq.${uid},recipient_id.eq.${uid}`,order:'created_at.desc',limit:'50'};
    const dms=await sbS('rf_direct_messages',dmParams);
    const dMatches=dms.filter(r=>(r.message_text||'').toLowerCase().includes(ql));
    if(dMatches.length) groups.push({title:'Messages',icon:'✉️',screen:mode==='bishop'?null:'s-dm',items:dMatches.map(r=>({text:r.message_text,meta:timeAgo(r.created_at)}))});

    // Bishop: also search pastors
    if(mode==='bishop'){
      const pastors=ST.allPastors.length?ST.allPastors:await sbS('rf_pastors',{select:'*',status:'eq.active'});
      const paMatches=pastors.filter(p=>(p.full_name||'').toLowerCase().includes(ql)||(p.church_name||'').toLowerCase().includes(ql)||(p.city||'').toLowerCase().includes(ql));
      if(paMatches.length) groups.push({title:'Pastors',icon:'👤',items:paMatches.map(p=>({text:p.full_name,meta:[p.church_name,p.city].filter(Boolean).join(' · ')||'—',action:()=>{bishopDrillPastor(p.id);$(mode+'-search').value='';resultsEl.classList.remove('show');}}))});
    }

    if(!groups.length){
      resultsEl.innerHTML='<div class="search-empty">No results for "'+esc(q)+'"</div>';
      return;
    }

    resultsEl.innerHTML=groups.map(g=>
      `<div class="search-group-title">${esc(g.title)}</div>`+
      g.items.slice(0,5).map((item,i)=>
        `<div class="search-item" data-group="${esc(g.title)}" data-idx="${i}" onclick="searchTap(this,'${g.screen||''}')">
          <div class="search-item-icon">${g.icon}</div>
          <div class="search-item-body">
            <div class="search-item-title">${esc(item.text)}</div>
            <div class="search-item-meta">${esc(item.meta)}</div>
          </div>
        </div>`
      ).join('')+
      (g.items.length>5?`<div class="search-item-meta" style="padding:8px 16px;text-align:center">+${g.items.length-5} more</div>`:'')
    ).join('');
  } catch(e){
    resultsEl.innerHTML='<div class="search-empty">Search failed. Check connection.</div>';
  }
}

const NOTIF = {
  items: [],
  unreadCount: 0,
  lastSeen: {},       // { dm: timestamp, prayer: timestamp, announcement: timestamp, blast: timestamp }
  pollInterval: null,
  audioCtx: null,
  permissionGranted: false,
};

// ── SOUND: gentle chime via Web Audio API ──
function playNotifSound(){
  try {
    if(!NOTIF.audioCtx) NOTIF.audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const ctx=NOTIF.audioCtx;
    if(ctx.state==='suspended') ctx.resume();
    // Two-tone chime: E5 → G5
    [659.25, 783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      gain.gain.setValueAtTime(0, ctx.currentTime+i*0.15);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime+i*0.15+0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.15+0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);
      osc.stop(ctx.currentTime+i*0.15+0.4);
    });
  } catch(e){ /* audio not available */ }
}

// ── IN-APP TOAST ──
let notifToastTimer=null;
function showNotifToast(icon, title, msg, screen){

  $('notif-toast-icon').textContent=icon;

}
function hideNotifToast(){ $('notif-toast').classList.remove('show'); clearTimeout(notifToastTimer); }

// ── NOTIFICATION DRAWER ──
function openNotifDrawer(){
  hideNotifToast();
  renderNotifDrawer();
  $('notif-backdrop').classList.add('open');
  $('notif-drawer').classList.add('open');
}
function closeNotifDrawer(){
  $('notif-backdrop').classList.remove('open');
  $('notif-drawer').classList.remove('open');
  // Mark all as read
  NOTIF.items.forEach(n=>n.unread=false);
  NOTIF.unreadCount=0;
  updateNotifBadges();
  saveLocal('notif_items',NOTIF.items.slice(0,50));
}
function renderNotifDrawer(){
  const list=$('notif-drawer-list');
  if(!NOTIF.items.length){
    list.innerHTML='<div class="notif-empty">No notifications yet.<br>You\'ll see new messages, prayers, and updates here.</div>';
    return;
  }
  list.innerHTML=NOTIF.items.slice(0,50).map((n,i)=>`<div class="notif-drawer-item ${n.unread?'unread':''}" onclick="notifTap(${i})">
    <div class="notif-icon">${esc(n.icon)}</div>
    <div class="notif-content">
      <div class="notif-item-title">${esc(n.title)}</div>
      <div class="notif-item-msg">${esc(n.msg)}</div>
      <div class="notif-item-time">${timeAgo(n.ts)}</div>
    </div>
  </div>`).join('');
}
function notifTap(idx){
  const n=NOTIF.items[idx];
  if(!n) return;
  n.unread=false;
  NOTIF.unreadCount=NOTIF.items.filter(x=>x.unread).length;
  updateNotifBadges();
  closeNotifDrawer();
  if(n.screen) go(n.screen);
}

// ── BADGE UPDATES ──
function updateNotifBadges(){
  const count=NOTIF.unreadCount;
  // Home bell badge
  const bell=$('notif-badge-home');
  if(bell){
    bell.textContent=count>9?'9+':count;
    bell.classList.toggle('show',count>0);
  }
  // Bishop bell badge
  const bBell=$('notif-badge-bishop');
  if(bBell){
    bBell.textContent=count>9?'9+':count;
    bBell.classList.toggle('show',count>0);
  }
}

// ── ADD NOTIFICATION ──
function addNotification(icon, title, msg, screen){
  const n={icon, title, msg, screen, ts:new Date().toISOString(), unread:true};
  NOTIF.items.unshift(n);
  if(NOTIF.items.length>100) NOTIF.items.length=100;
  NOTIF.unreadCount=NOTIF.items.filter(x=>x.unread).length;
  updateNotifBadges();
  // In-app toast
  showNotifToast(icon, title, msg, screen);
  // Sound
  playNotifSound();
  // Browser notification (outside app)
  fireOSNotification(title, msg, icon);
  // Persist
  saveLocal('notif_items',NOTIF.items.slice(0,50));
}

// ── BROWSER NOTIFICATION API (outside app) ──
function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){ NOTIF.permissionGranted=true; subscribeToPush(); return; }
  if(Notification.permission!=='denied'){
    Notification.requestPermission().then(p=>{ NOTIF.permissionGranted=p==='granted'; if(p==='granted') subscribeToPush(); });
  }
}
function fireOSNotification(title, body, icon){
  if(!NOTIF.permissionGranted) return;
  if(document.visibilityState==='visible') return; // only when tab not focused
  try {
    const n=new Notification(C.networkShort+': '+title,{
      body: body,
      icon: KG_LOGO,
      badge: KG_LOGO,
      tag: 'kg-'+Date.now(),
      renotify: true,
    });
    n.onclick=()=>{ window.focus(); n.close(); };
  } catch(e){ /* notification not supported */ }
}

// ── POLLING: check for new content ──
function initNotifPolling(){
  // Load persisted state
  NOTIF.items=loadLocal('notif_items')||[];
  NOTIF.unreadCount=NOTIF.items.filter(x=>x.unread).length;
  NOTIF.lastSeen=loadLocal('notif_last_seen')||{};
  updateNotifBadges();
  // Request browser notification permission after first user interaction
  document.addEventListener('click',function onFirstClick(){
    requestNotifPermission();
    // Unlock audio context on first interaction
    if(NOTIF.audioCtx&&NOTIF.audioCtx.state==='suspended') NOTIF.audioCtx.resume();
    document.removeEventListener('click',onFirstClick);
  },{once:true});
  // Start polling
  pollForNotifications();
  NOTIF.pollInterval=setInterval(pollForNotifications, 30000);
}

async function pollForNotifications(){
  if(!ST.session) return;
  const isBishop=ST.session.role==='bishop';
  const uid=ST.session.userId;
  try {
    // DMs — check for new messages
    const dmFilter=isBishop
      ? {select:'id,sender_id,message_text,created_at,rf_pastors:sender_id(full_name)',order:'created_at.desc',limit:'1','sender_id':'neq.bishop'}
      : {select:'id,sender_id,message_text,created_at',order:'created_at.desc',limit:'1','recipient_id':'eq.'+uid,'sender_id':'eq.bishop'};
    const dms=await sbS('rf_direct_messages',dmFilter);
    if(dms.length){
      const last=dms[0];
      const lastTs=NOTIF.lastSeen.dm||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.dm=last.created_at;
        if(lastTs){ // don't notify on first load
          const sender=isBishop?(last.rf_pastors?.full_name||'A pastor'):'Bishop '+C.bishopName.split(' ').pop();
          addNotification('✉️','New message from '+sender, last.message_text, isBishop?null:'s-dm');
        }
      }
    }

    // Prayer requests — new ones
    const prayers=await sbS('rf_prayer_requests',{select:'id,request_text,created_at,rf_pastors:pastor_id(full_name)',status:'eq.active',order:'created_at.desc',limit:'1'});
    if(prayers.length){
      const last=prayers[0];
      const lastTs=NOTIF.lastSeen.prayer||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.prayer=last.created_at;
        if(lastTs){
          addNotification('🙏','New prayer request', (last.rf_pastors?.full_name||'A pastor')+' shared a prayer request', isBishop?null:'s-prayer');
        }
      }
    }

    // Announcements — new ones
    const anns=await sbS('rf_announcements',{select:'id,title,body,created_at',status:'eq.active',order:'created_at.desc',limit:'1'});
    if(anns.length){
      const last=anns[0];
      const lastTs=NOTIF.lastSeen.announcement||'';
      if(last.created_at>lastTs){
        NOTIF.lastSeen.announcement=last.created_at;
        if(lastTs){
          addNotification('📢','New announcement', last.title||last.body||'New update posted', isBishop?null:'s-ann');
        }
      }
    }

    // Bishop blasts — for pastors only
    if(!isBishop){
      const blasts=await sbS('rf_bishop_messages',{select:'id,message_text,sent_at',order:'sent_at.desc',limit:'1'});
      if(blasts.length){
        const last=blasts[0];
        const lastTs=NOTIF.lastSeen.blast||'';
        if(last.sent_at>lastTs){
          NOTIF.lastSeen.blast=last.sent_at;
          if(lastTs){
            addNotification('👑','Message from Bishop '+C.bishopName.split(' ').pop(), last.message_text, 's-home');
          }
        }
      }
    }

    saveLocal('notif_last_seen',NOTIF.lastSeen);
  } catch(e){ /* polling error — skip this cycle */ }
}

// ── PUSH SUBSCRIPTION: register with push service + save to Supabase ──
async function subscribeToPush(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if(!C.vapidPublicKey) return;
  try {
    const reg=await navigator.serviceWorker.ready;
    // Check for existing subscription
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      // Convert VAPID public key from base64url to Uint8Array
      const padding='='.repeat((4-C.vapidPublicKey.length%4)%4);
      const b64=C.vapidPublicKey.replace(/-/g,'+').replace(/_/g,'/')+padding;
      const raw=atob(b64);
      const key=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++) key[i]=raw.charCodeAt(i);

      sub=await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:key
      });
    }
    if(!sub) return;
    // Save subscription to Supabase
    const subJson=sub.toJSON();
    const userId=ST.session?.userId;
    if(!userId) return;
    await sbI('rf_push_subscriptions',{
      user_id:userId,
      endpoint:subJson.endpoint,
      p256dh:subJson.keys?.p256dh||'',
      auth:subJson.keys?.auth||''
    }).catch(async ()=>{
      // Likely duplicate — update instead
      await sbU('rf_push_subscriptions',`user_id=eq.${userId}&endpoint=eq.${encodeURIComponent(subJson.endpoint)}`,{
        p256dh:subJson.keys?.p256dh||'',
        auth:subJson.keys?.auth||'',
        updated_at:new Date().toISOString()
      }).catch(()=>{});
    });
  } catch(e){ /* push subscription not available */ }
}

// ── FIRE PUSH NOTIFY: call Edge Function when content is created ──
async function firePushNotify(type, data){
  try {
    await fetch(`${C.supabaseUrl}/functions/v1/${C.pushNotifyFn}`,{
      method:'POST',
      headers:SB_HDR(),
      body:JSON.stringify({type,data})
    });
  } catch(e){ /* push notify fire-and-forget */ }
}

  if(saved?.role==='bishop'||saved?.role==='admin'){

  go('s-login');
}

// ── SERVICE WORKER + OFFLINE SUPPORT ──
const offlineBar=document.getElementById('kg-offline-bar');
const onlineToast=document.getElementById('kg-online-toast');
let swReady=null;

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    swReady=reg;
    // Request background sync when available
    if('sync' in reg) reg.sync.register('kg-sync-mutations').catch(()=>{});
  }).catch(()=>{});
  // Listen for messages from service worker
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data.type==='QUEUED_OFFLINE'){
      // Data was saved offline — show confirmation
      offlineBar.classList.add('show');
    }
    if(e.data.type==='SYNC_COMPLETE'){
      if(e.data.synced>0){
        showOnlineToast(e.data.synced+' item'+(e.data.synced>1?'s':'')+' synced');
      }
      if(e.data.remaining===0) offlineBar.classList.remove('show');
    }
    if(e.data.type==='FORCE_SYNC_DONE'){
      showOnlineToast('Sync complete');
    }
  });
}

function showOnlineToast(msg){
  onlineToast.textContent='\u2713 '+msg;
  onlineToast.classList.add('show');
  setTimeout(()=>onlineToast.classList.remove('show'),3000);
}

function forceSyncNow(){
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage('FORCE_SYNC');
  }
}

window.addEventListener('online',()=>{
  offlineBar.classList.remove('show');
  showOnlineToast('Back online \u2014 syncing your data');
  // Trigger background sync
  if(swReady&&'sync' in swReady) swReady.sync.register('kg-sync-mutations').catch(()=>{});
  else if(navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage('FORCE_SYNC');
});

window.addEventListener('offline',()=>{
  offlineBar.classList.add('show');
});

// Show bar immediately if already offline
if(!navigator.onLine) offlineBar.classList.add('show');

  is_read bool default false,
  created_at timestamptz default now()
);
create table rf_bishop_messages (
  id uuid primary key default gen_random_uuid(),
  message_text text not null,
  type text default 'blast',
  sent_at timestamptz default now()
);
create table rf_announcements (
  id uuid primary key default gen_random_uuid(),
  pastor_id text not null,
  title text default '',
  body text default '',
  image_data text,
  is_pinned bool default false,
  status text default 'active',
  created_at timestamptz default now()
);
-- Note: image_data stores base64 encoded images (keep under 4MB per image)

-- Enable RLS on sensitive tables
alter table rf_checkins enable row level security;
alter table rf_direct_messages enable row level security;
alter table rf_pastors enable row level security;
